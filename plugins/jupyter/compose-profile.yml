# shepard-plugin-jupyter — JupyterHub sidecar compose fragment (J1e-PR-05)
#
# This file is the plugin's declaration of its external sidecar service
# (per the principle in `aidocs/platform/47-dev-experience-and-plugin-system.md §2.6`
# and the memory rule `feedback_plugins_declare_sidecars.md`).
#
# Until the `SidecarsAssembler` operator-side renderer ships (PM1f), this
# fragment is overlaid by hand:
#
#   docker compose \
#     -f infrastructure/docker-compose.yml \
#     -f plugins/jupyter/compose-profile.yml \
#     --profile jupyter \
#     up -d
#
# The fragment defines:
#   * `jupyterhub` — the multi-user notebook spawner
#   * `jupyterhub_data` / `jupyterhub_config` — named volumes for persistent state
#
# It joins the existing `shepard` and `frontend` compose networks so:
#   * JupyterHub can reach Keycloak via the same network the backend uses
#   * the reverse proxy (Caddy / Zoraxy) can route to it
#
# Operators: see `plugins/jupyter/docs/install.md` for the full runbook,
# OIDC client provisioning, env-var checklist, and Zoraxy route notes.

services:
  jupyterhub:
    # JupyterHub 5.x is the current stable major (5.2.1 as of 2026-05; pinned
    # to the minor band rather than `:latest` per ADR-0020).
    # Build a tiny derived image that pip-installs oauthenticator + dockerspawner
    # on top of the upstream jupyterhub/jupyterhub:5 (those packages aren't in
    # the base image). Build context is the plugin dir, NOT infrastructure/.
    build:
      context: ../plugins/jupyter
      dockerfile: Dockerfile
    image: shepard-jupyterhub:local
    container_name: shepard-jupyterhub
    restart: unless-stopped
    environment:
      # --- OIDC wiring ---
      # Source of truth for the realm URL is the same env var Shepard's
      # backend reads (`OIDC_AUTHORITY`).  JupyterHub's GenericOAuth
      # authenticator reads our derived names below; the
      # `jupyterhub_config.py` mounts the translation.
      SHEPARD_OIDC_ISSUER_URL: ${OIDC_AUTHORITY}
      # Back-channel issuer URL — JH server-to-server token + userinfo POSTs.
      # Must be a network path the JH container can route (not the public Zoraxy IP).
      # Falls back to the front-channel issuer if unset.
      SHEPARD_OIDC_INTERNAL_ISSUER_URL: ${SHEPARD_OIDC_INTERNAL_ISSUER_URL:-}
      # DockerSpawner's network — must be the compose-prefixed network name
      # (e.g. `infrastructure_shepard`), not the logical declaration `shepard`.
      JUPYTERHUB_DOCKER_NETWORK: ${JUPYTERHUB_DOCKER_NETWORK:-infrastructure_shepard}
      JUPYTERHUB_KEYCLOAK_CLIENT_ID: ${JUPYTERHUB_KEYCLOAK_CLIENT_ID:-jupyterhub}
      JUPYTERHUB_KEYCLOAK_CLIENT_SECRET: ${JUPYTERHUB_KEYCLOAK_CLIENT_SECRET}
      # The public-facing URL JupyterHub redirects users back to after
      # OIDC sign-in.  Operator sets this in the env file once the
      # reverse-proxy route exists.
      JUPYTERHUB_PUBLIC_URL: ${JUPYTERHUB_PUBLIC_URL:-https://shepard.nuclide.systems/jupyterhub}
      # auth_state encryption — used to encrypt user OIDC tokens stored server-side.
      # Operator sets a 32-byte hex string in .env; not optional when auth_state is enabled.
      JUPYTERHUB_CRYPT_KEY: ${JUPYTERHUB_CRYPT_KEY:-}
      # --- single-user notebook image ---
      # Pinned scipy-notebook for predictable size + scientific deps.
      # Operators wanting a different image set
      # JUPYTERHUB_SINGLEUSER_IMAGE in their env file.
      DOCKER_NOTEBOOK_IMAGE: ${JUPYTERHUB_SINGLEUSER_IMAGE:-jupyter/scipy-notebook:python-3.11}
      # --- J1e-PR-06 auto-fetch allowlist ---
      # Comma-separated list of hostnames the pre-spawn hook is allowed to
      # fetch `?file=<url>` from. SSRF defense — anything not in this set
      # is rejected without an outbound call. Default covers the canonical
      # nuclide.systems hosts; operators on other domains override.
      JUPYTERHUB_SHEPARD_ALLOWED_HOSTS: ${JUPYTERHUB_SHEPARD_ALLOWED_HOSTS:-shepard.nuclide.systems,shepard-api.nuclide.systems}
    volumes:
      # Persistent user state (notebooks, dotfiles).
      - jupyterhub_data:/data
      # JupyterHub config + cookie secret + sqlite db.
      - jupyterhub_config:/srv/jupyterhub
      # Mount the rendered jupyterhub_config.py from the plugin's config
      # directory.  Read-only — config is source-controlled, not mutated
      # by the running hub.
      # Relative paths in compose-profile.yml resolve against the FIRST
      # `-f` file's directory (infrastructure/docker-compose.yml here),
      # so `./plugins/...` would wrongly look in infrastructure/plugins/.
      # `../plugins/...` goes up one level from infrastructure/ → /opt/shepard/plugins/.
      - ../plugins/jupyter/config/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
      # JupyterHub needs to talk to the docker daemon to spawn single-user
      # containers (DockerSpawner).  Operators using Kubernetes swap this
      # for a service-account binding — see install.md §"Kubernetes notes".
      - /var/run/docker.sock:/var/run/docker.sock
      # J1e-PR-06 autofetch: the pre-spawn hook resolves the user's
      # `jupyterhub-user-<name>` volume via the docker SDK and writes the
      # fetched file at the host-side Mountpoint path. Without this bind,
      # the host path returned by docker SDK isn't visible from inside JH
      # and the file lands stranded in JH's own ephemeral FS.
      # Read-write on the volumes root only; JH still cannot see other
      # docker resources. Single-tenant deploy acceptable; for multi-tenant
      # use a per-plugin drop-box volume mounted into both JH and the
      # single-user image.
      - /var/lib/docker/volumes:/var/lib/docker/volumes:rw
    healthcheck:
      # JupyterHub exposes a /hub/health endpoint, but with base_url=/jupyterhub
      # it's served at /jupyterhub/hub/health. The mismatch was producing a 404
      # every 30s in the logs (cosmetic — container stayed up via restart policy).
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8000/jupyterhub/hub/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - shepard
      - frontend
    # No COMPOSE_PROFILES gate — operator-preference 2026-05-29: the act of
    # including `-f plugins/jupyter/compose-profile.yml` in the docker compose
    # invocation IS the opt-in. Deployments that don't want JupyterHub omit
    # the file; deployments that do, get the service unconditionally.

networks:
  # Re-declare the networks the parent compose file owns so this overlay
  # parses standalone (`docker compose -f plugins/jupyter/compose-profile.yml config`).
  # `external: true` would be wrong — the parent file creates them; here we
  # just declare them as already-existing references.
  shepard:
  frontend:

volumes:
  jupyterhub_data:
  jupyterhub_config:
