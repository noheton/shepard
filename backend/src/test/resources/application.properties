# Test Configuration
quarkus.http.test-port=8083
quarkus.http.test-ssl-port=8446
quarkus.http.test-timeout=100s

# OIDC public key for @QuarkusTest tests that boot the full app. The
# @QuarkusComponentTest tests provide this via @TestConfigProperty
# individually; @QuarkusTest classes inherit from this file so a single
# default avoids per-test boilerplate. Same throwaway key shape as
# JWTFilterTest:47-49 (it's a published RSA pubkey from the test suite,
# never a real credential).
oidc.
oidc.role=test_role

# Logging
quarkus.log.level=INFO
quarkus.log.category."io.quarkus.arc.requestContext".level=INFO
quarkus.log.category."io.quarkus.arc.requestContext".min-level=INFO

# Turn off warnings from deprecated neo4j cypher statements
quarkus.log.category."org.neo4j.ogm".level=OFF
