# P4: root-path is now `/`. The upstream-frozen surface lives under
# /shepard/api/... via explicit class-level @Path("/shepard/api/...")
# (see Constants.SHEPARD_API); new /v2/... resources mount directly at
# /v2/... under de.dlr.shepard.v2. Fenced by V2NamespaceTest.
quarkus.http.root-path=/
# `non-application-root-path` is absolute — unaffected by the root-path
# change. OpenAPI / Swagger UI / health endpoints continue to resolve
# under /shepard/doc/...
quarkus.http.non-application-root-path=/shepard/doc
quarkus.shutdown.timeout=PT10S

# Health check
quarkus.smallrye-health.root-path=/shepard/api/healthz
quarkus.smallrye-health.openapi.included=true
# Disable the default health check from the JDBC
quarkus.datasource.health.enabled=false
# Disable default MongoDB extention health check
quarkus.mongodb.health.enabled=false
# Maximum age of the last successful per-DB ping for readiness to report UP
shepard.health.readiness.max-staleness=PT30S
# Interval at which the recovery scheduler re-pings stale required DBs
shepard.health.recovery.interval=PT15S


#version endpoint
shepard.version=${project.version}

# CORS
# IMPORTANT: when the request carries credentials (browser fetch with
# `credentials: include` — which the frontend uses for cookie-based
# session auth), the spec forbids `Access-Control-Allow-Origin: *`.
# The browser blocks the response and reports "ERR_FAILED 200" with
# the misleading CORS error in DevTools. Solution: list the explicit
# origins via the operator-supplied env var SHEPARD_CORS_ORIGINS, and
# turn on access-control-allow-credentials so cross-origin requests
# from the configured frontend hostname succeed.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${SHEPARD_CORS_ORIGINS:*}
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.methods=GET,POST,HEAD,OPTIONS,DELETE,PUT,PATCH
quarkus.http.cors.headers=Origin,Accept,X-Requested-With,Content-Type,Access-Control-Request-Method,Access-Control-Request-Headers,Authorization,X-API-KEY
quarkus.http.cors.exposed-headers=Content-Disposition,Location,ETag

# Logging
quarkus.console.color=true
quarkus.log.level=INFO
quarkus.log.min-level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss.SSS} [%p] [%c{5.}] (%t) %s%e%n
quarkus.log.file.enabled=true
quarkus.log.file.path=logs/shepard.log
# https://docs.redhat.com/en/documentation/red_hat_build_of_quarkus/3.2/html/logging_configuration/logging-configuration#root-logger-configuration
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5p] [%c] (%t) %s%e%n
quarkus.log.file.level=INFO
quarkus.log.file.rotation.max-backup-index=10
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd

# Turn off warnings from deprecated neo4j cypher statements
quarkus.log.category."org.neo4j.ogm.drivers.bolt.response.BoltResponse.deprecation".level=OFF
quarkus.log.category."org.neo4j.ogm.drivers.bolt.response.BoltResponse.unrecognized".level=OFF

# Logging settings for neo4j queries
quarkus.log.category."org.neo4j.ogm.drivers.bolt.request.BoltRequest".level=INFO
quarkus.log.category."de.dlr.shepard.common.neo4j.daos.GenericDAO".level=INFO

# Turn off info messages of PKIHelper because it is flooding our logs
quarkus.log.category."de.dlr.shepard.common.util.PKIHelper".level=WARN

# MongoDB
quarkus.mongodb.connection-string=mongodb://mongo@mongodb:27017

# TimescaleDB

quarkus.datasource.db-kind=postgresql
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration,classpath:de/dlr/shepard/data/timeseries/migrations
# Bound the Flyway startup wait to ~50s so it fails fast inside the same
# 60s window as shepard.migrations.connection-wait-timeout (Neo4j).
# Default interval is 120s, which alone exceeds the ceiling.
quarkus.flyway.connect-retries=10
quarkus.flyway.connect-retries-interval=PT5S
quarkus.hibernate-orm.packages=de.dlr.shepard.data.timeseries

# Spatial Database
# https://quarkus.io/guides/flyway#multiple-datasources
quarkus.datasource.spatial.db-kind=postgresql
quarkus.flyway.spatial.active=${shepard.spatial-data.enabled}
quarkus.flyway.spatial.baseline-on-migrate=true
quarkus.flyway.spatial.locations=db/spatial/migration
quarkus.flyway.spatial.migrate-at-start=true
# Same ~50s ceiling for the spatial Flyway datasource.
quarkus.flyway.spatial.connect-retries=10
quarkus.flyway.spatial.connect-retries-interval=PT5S

quarkus.hibernate-orm.spatial.active=${shepard.spatial-data.enabled}
quarkus.hibernate-orm.spatial.datasource=spatial
quarkus.hibernate-orm.spatial.packages=de.dlr.shepard.data.spatialdata.model

# OpenAPI & Swagger
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.operationIdStrategy=METHOD
quarkus.smallrye-openapi.store-schema-directory=target/openapi/
quarkus.smallrye-openapi.open-api-version=3.0.1
quarkus.smallrye-openapi.info-title=${project.name}
quarkus.smallrye-openapi.info-version=${project.version}
# keep scanning for annotations, while also using static openapi.yml template
mp.openapi.scan.disable=false
quarkus.smallrye-openapi.ignore-static-document=false
quarkus.smallrye-openapi.path=openapi.json

# OAS1 — public base URL for the OpenAPI `servers` block. When set, the
# RUN-stage PublicServerUrlFilter prepends an absolute-URL server entry
# `<base-url>/shepard/api` to the spec, so OpenAPI-Generator clients
# downloading the spec from a non-browser context get a usable absolute
# URL instead of just the relative `/shepard/api`. Leave blank in dev
# (default) — the relative entry from META-INF/openapi.yaml is enough.
# Production deployments should set SHEPARD_PUBLIC_BASE_URL=
# https://shepard-api.example.dlr.de (no trailing slash; no path suffix).
shepard.public.base-url=${SHEPARD_PUBLIC_BASE_URL:}

# Quarkus File Uploads
# Set unlimited max-body size for file uploads
# https://github.com/quarkusio/quarkus/wiki/Migration-Guide-1.6
quarkus.http.limits.max-body-size=

# Quarkus Metrics
# Enable Micrometer metrics support in general.
quarkus.micrometer.enabled=true

# Provide metrics as json on /metrics endpoint
quarkus.micrometer.export.json.enabled=true

# Activate/Deactivate http server metrics.
quarkus.micrometer.binder.http-server.enabled=true

# Netty uses memory allocators to pool the memory buffers for reuse.
quarkus.micrometer.binder.netty.enabled=true

# Activates/Deactivates metrics for the java virtual machine.
quarkus.micrometer.binder.jvm=true

# Activates/Deactivates metrics for the system.
quarkus.micrometer.binder.system=true

# Activates/Deactivates metrics for vertx.
quarkus.micrometer.binder.vertx.enabled=true

# Activates/Deactivates metrics for Hibernate.
quarkus.hibernate-orm.metrics.enabled=true

# Activates/Deactivates metrics for MongoDB.
quarkus.mongodb.metrics.enabled=true

# Enable exporting of metrics
quarkus.micrometer.export.json.path=metrics/json
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=metrics/prometheus

# Maximum total time the startup wait for the neo4j database connection retries before failing fast
shepard.migrations.connection-wait-timeout=PT60S

# FR1b — opt-in singleton-split migration toggle (aidocs/53 §1.8.5).
# When true, V23__Split_singleton_bundles_to_FileReferences moves
# every :FileBundleReference that holds exactly one ShepardFile under
# its single default :FileGroup over to a :SingletonFileReference
# node, and rehomes the Mongo metadata doc from the per-bundle
# collection into the shared `_shepard_files` namespace. Default off
# for upgrades — admins schedule the migration when convenient.
# Greenfield installs may flip this on at install time (no-op until
# bundles exist).
shepard.migration.split-singletons.enabled=false

# Versioning Feature Toggle (runtime)
shepard.features.versioning.enabled=false

# Spatial Data Infrastructure Toggle
# Canonical key (A3c): shepard.infrastructure.spatial.enabled.
# Legacy alias shepard.spatial-data.enabled is still honoured and overrides the
# canonical default if set externally; it is deprecated for removal in v6.0.
shepard.infrastructure.spatial.enabled=false
shepard.spatial-data.enabled=${shepard.infrastructure.spatial.enabled}

# A5a — HDF5 / HSDS sidecar feature toggle (off by default).
# When false (default) the /v2/hdf-containers/... endpoints return 404
# and no HsdsClient bean is instantiated. When true the operator MUST
# also supply Basic-auth credentials for the HSDS sidecar (Phase 1).
# See aidocs/35-hdf5-hsds-implementation-design.md and docs/admin.md
# §"HDF5 (HSDS)".
shepard.hdf.enabled=false
shepard.hdf.hsds.endpoint=http://shepard-hsds:5101
# Empty defaults — operator must set these when enabling the feature.
# Startup fails fast if the toggle is on but credentials are blank.
shepard.hdf.hsds.username=
shepard.hdf.hsds.password=
# Connect / response timeout for HSDS calls. Conservative default; raise
# for large-domain provisioning workloads.
shepard.hdf.hsds.timeout=PT10S

# Automatically convert int values to double values in timeseries if there are already double values present
shepard.autoconvert-int=false

# NDJSON streaming ingest for timeseries data points (P14)
shepard.timeseries.ingest.ndjson.batch-size=5000
shepard.timeseries.ingest.ndjson.max-duration=PT5M

# AI1c — TimeseriesReference quality-score background job (aidocs/43 §3.2).
# Pure-heuristic scorer (completeness + coverage + stability). No LLM call.
# Default opt-in `false` — operators flip `enabled=true` once they're ready
# to spend the per-tick read I/O against Timescale. `interval` resolves at
# startup via @Scheduled; restart to change. `batch-size` caps how many
# refs the scorer touches per tick (clamped to [1, 10000] in the job).
shepard.timeseries.quality-scoring.enabled=false
shepard.timeseries.quality-scoring.interval=PT6H
shepard.timeseries.quality-scoring.batch-size=100

# FS1e2 — background continuous-sweep storage migration
# Set enabled=true and configure source/target to drain one adapter automatically.
# `interval` resolves at startup via @Scheduled; restart to change the cadence.
shepard.migration.auto-sweep.enabled=false
shepard.migration.auto-sweep.source=
shepard.migration.auto-sweep.target=
shepard.migration.auto-sweep.interval=PT5M

# P10a/P10b/P10c — SQL-over-HTTP timeseries endpoint (POST /v2/sql/timeseries).
# Flipped to true in P10c — endpoint reviewed and ready for production.
# Set to false to disable (returns 404). See aidocs/platform/29-p10-implementation-design.md §11.
shepard.timeseries.sql.enabled=true
# Hard row cap; enforced in the writer loop (not via SQL LIMIT).
# When reached the HTTP trailer x-shepard-truncated: true is emitted.
shepard.timeseries.sql.max-rows=1000000
# Hard query duration cap as ISO-8601 duration (P10b).
# Implemented via PostgreSQL statement_timeout on the JDBC connection.
# On timeout the endpoint returns HTTP 504 {"error":"query exceeded max duration"}.
shepard.timeseries.sql.max-duration=PT60S

quarkus.cache.caffeine.maximum-size=8192
quarkus.cache.caffeine.expire-after-write=3h

# Permissions cache (per-cache overrides). TTL defaults to 5 minutes,
# max-size to 10000. Tunable via shepard.permissions.cache.* at runtime.
shepard.permissions.cache.ttl=PT5M
shepard.permissions.cache.max-size=10000
quarkus.cache.caffeine."permissions-service-cache".expire-after-write=${shepard.permissions.cache.ttl}
quarkus.cache.caffeine."permissions-service-cache".maximum-size=${shepard.permissions.cache.max-size}
# Expose Caffeine hit/miss/eviction/size as Micrometer time series for the permissions cache.
quarkus.cache.caffeine."permissions-service-cache".metrics-enabled=true

# Permission cache warming (opt-in). When enabled, the top-N most-used
# entities are pre-loaded into the permission cache on StartupEvent so the
# first request after restart skips the Neo4j round-trip.
shepard.permissions.cache.warm.enabled=false
shepard.permissions.cache.warm.max-entries=500

# A0 / C3 — default-owner for the V14 orphan-permissions backfill.
# Required at startup if any BasicEntity nodes lack a :has_permissions
# edge (post-C3 fail-closed flip in PermissionsService.getRoles).
# Operators upgrading from an older shepard with pre-permission entities
# MUST set this to an existing username (e.g. an instance-admin) before
# the next start, otherwise OrphanPermissionsBackfillContext aborts.
# Greenfield deployments can leave it unset.
shepard.permissions.default-owner=

# PROV1 — provenance / activity-log capture (aidocs/55).
# Master toggle; default on. Set to false to disable capture entirely
# (the /v2/provenance/activities endpoint still works against legacy
# rows, but no new rows land).
shepard.provenance.enabled=true
# Default: capture only mutating verbs (POST/PUT/PATCH/DELETE) on 2xx.
# Set to true to also capture read endpoints; comes with significant
# row-volume cost on read-heavy installs. See aidocs/55 §4.
shepard.provenance.capture-reads=false
# Stamped onto every Activity row. 'local' is the canonical central
# value; shepard Edge deployments (aidocs/60) override this with the
# per-Edge UUID so post-sync rows carry their origin.
#
# KIP1h also reuses this key as the <instance.id> segment of every
# local-minted PID (shepard:<instance.id>:<kind>:<appId>:v<n>).
# Production deployments must set this to a namespaced value (e.g.
# `dlr.de/shepard-prod`, `example.org/lab-a`) so PIDs minted by
# different instances don't collide. Greenfield installs running on
# the `local` default see a startup WARN from LocalMinter prompting
# the operator to pick a real namespace. Deploy-time-only per the
# "cluster identity / topology" CLAUDE.md exception — changing this
# at runtime would split each entity's PID history across two
# namespaces.
shepard.instance.id=local
# PROV1f — nightly retention TTL (days). Activities older than this
# are deleted by ProvenanceRetentionJob (runs daily 03:42). Negative
# value = keep forever. Default 730 = 2 years per aidocs/55 §7.
shepard.provenance.retention-days=730

# A0 / F8 — configurable OIDC roles-claim path. Default targets
# Keycloak's `realm_access.roles` shape. Operators on Pocket ID /
# Authentik / Azure AD set this to the dot-path that carries their
# role-strings (e.g. `groups`, `roles`).
shepard.oidc.roles-claim-path=realm_access.roles

# A0 — name of the role-string within the IdP claim that maps to
# shepard's `instance-admin` role. Empty (default) = no IdP-side admin
# in this deployment; only Neo4j-internal :HAS_ROLE edges grant the
# role. Safe-by-default.
shepard.instance-admin.role=

# A0 — operator-configurable allowlist of roles that API keys may
# carry. Default is the singleton `[instance-admin]`; shrink to empty
# to forbid role-bearing keys entirely.
shepard.apikey.role-allowlist=instance-admin

# A0 — path for the bootstrap token written by
# BootstrapTokenInitializer when no instance-admin exists. Mode 0600
# on POSIX. Override for containers / non-root deployments.
shepard.bootstrap.token-path=/opt/shepard/.bootstrap-token

# N1a — neosemantics ("n10s") internal semantic repository. The startup hook
# always tries CALL n10s.graphconfig.init at boot. If n10s isn't installed the
# hook logs a warning and skips — zero impact on operators without n10s.
# Passed verbatim to n10s graphconfig.init({handleVocabUris}). The
# default 'IGNORE' keeps full IRIs (no prefix-shortening on read) —
# safest interop. Operators who want n10s's lossy 'SHORTEN' or 'MAP'
# modes can override here.
shepard.semantic.internal.handle-vocab-uris=IGNORE

# N1f — base URL for the Neo4j HTTP API where n10s registers its SPARQL
# endpoint at POST /rdf/neo4j/sparql. Auth via Basic (same username/password
# as the Bolt connector). Deploy-time only — the port topology (Neo4j HTTP
# port 7474) is not a runtime-flippable knob per CLAUDE.md exceptions.
# Must not include a trailing slash. Default matches the compose stack where
# Neo4j is reachable via Docker network at neo4j:7474.
shepard.semantic.internal.http-url=http://neo4j:7474

# N1b — pre-seed the bundled common ontologies (PROV-O / Dublin
# Core / schema.org / FOAF / QUDT / OM-2 / W3C Time / GeoSPARQL) into
# the n10s repository on startup. Default ON: casual users get a
# useful annotation vocabulary on day one without any extra steps.
# The seed service is fail-soft — a missing n10s plugin or a corrupt
# bundle is logged and skipped, never escalated to a startup failure.
# Operators who want a bare n10s (no shepard-bundled vocab) flip this
# to false. ADR-0019 in aidocs/63 records the default-on rationale.
shepard.semantic.internal.preseed-ontologies.enabled=true
# Comma-separated bundle ids to skip during pre-seed. Recognised ids:
# prov-o, dublin-core, schema-org, foaf, qudt, om-2, time, geosparql,
# obo-relations, metadata4ing. Default empty (seed all). Example:
# 'qudt,om-2' for installs that don't need either units ontology.
#
# N1c2: this CSV is the **install default**. On first start the
# value here seeds the runtime `:SemanticConfig` singleton; thereafter
# operator mutations via /v2/admin/semantic/ontologies (or
# `shepard-admin semantic ontologies disable/enable`) take
# precedence. Per CLAUDE.md "Always: surface operator knobs", the
# runtime row wins; this key is the IaC-shipped baseline.
shepard.semantic.internal.preseed-ontologies.skip-bundles=

# PM1a — plugin SPI baseline. The `shepard.plugins.dir` key is
# deploy-time-only (filesystem-topology exception per CLAUDE.md
# "admin-configurable" rule): an operator overrides it only when the
# container layout puts plugin JARs somewhere other than the default.
# At startup the backend walks this directory for `*.jar` files,
# builds a child URLClassLoader per JAR, and discovers each plugin's
# `PluginManifest` via Java's ServiceLoader. See ADR-0023 + aidocs/47.
shepard.plugins.dir=backend/plugins
# Quarkus build-time CDI / Jandex indexing of plugin JARs that ship
# on the backend's compile-time classpath (i.e. via Maven
# `<dependency>` rather than just dropped into `backend/plugins/`
# at runtime). The PM1a phase-3 shape ships UH1a as
# `shepard-plugin-unhide` on the build classpath so its
# `@ApplicationScoped` beans + `@Path` resources are discovered
# at build time. Add one block per build-classpath plugin.
quarkus.index-dependency.shepard-plugin-unhide.group-id=de.dlr.shepard.plugins
quarkus.index-dependency.shepard-plugin-unhide.artifact-id=shepard-plugin-unhide
# KIP1g — same shape as UH1a, ensures Quarkus indexes the
# `shepard-plugin-kip` JAR's `KipResolverRest` `@Path` resource
# at build time so `GET /v2/.well-known/kip/{pid-suffix}` is wired.
quarkus.index-dependency.shepard-plugin-kip.group-id=de.dlr.shepard.plugins
quarkus.index-dependency.shepard-plugin-kip.artifact-id=shepard-plugin-kip
# KIP1h — same shape as UH1a + KIP1g, ensures Quarkus indexes the
# `shepard-plugin-minter-local` JAR's `LocalMinter` `@ApplicationScoped`
# bean at build time so `MinterRegistry` discovers it on startup
# when `shepard.publish.minter=local` (the default).
quarkus.index-dependency.shepard-plugin-minter-local.group-id=de.dlr.shepard.plugins
quarkus.index-dependency.shepard-plugin-minter-local.artifact-id=shepard-plugin-minter-local
# KIP1d — same shape as the other plugin index-dependency entries.
# Ensures Quarkus indexes the `shepard-plugin-minter-datacite` JAR's
# `DataciteMinter` `@ApplicationScoped` bean + `DataciteAdminRest`
# `@Path` resource at build time so `MinterRegistry` + JAX-RS
# scanning pick them up when `shepard.publish.minter=datacite`.
quarkus.index-dependency.shepard-plugin-minter-datacite.group-id=de.dlr.shepard.plugins
quarkus.index-dependency.shepard-plugin-minter-datacite.artifact-id=shepard-plugin-minter-datacite
# KIP1c — same shape. Ensures Quarkus indexes the `shepard-plugin-minter-epic` JAR's
# `EpicMinter` `@ApplicationScoped` bean + `EpicAdminRest`
# `@Path` resource at build time so `MinterRegistry` + JAX-RS
# scanning pick them up when `shepard.publish.minter=epic`.
quarkus.index-dependency.shepard-plugin-minter-epic.group-id=de.dlr.shepard.plugins
quarkus.index-dependency.shepard-plugin-minter-epic.artifact-id=shepard-plugin-minter-epic
# SPI1a — same shape. Ensures Quarkus indexes the `shepard-plugin-spatial` JAR's
# CDI beans (SpatialDataContainerService, SpatialDataPointRest, etc.) at build
# time so JAX-RS scanning picks them up when the plugin is on the classpath.
quarkus.index-dependency.shepard-plugin-spatial.group-id=de.dlr.shepard.plugins
quarkus.index-dependency.shepard-plugin-spatial.artifact-id=shepard-plugin-spatial
# PL1c — same shape. Ensures Quarkus indexes the `shepard-plugin-hdf5` JAR's
# CDI beans (HdfContainerService, HdfContainerRest, HdfAdminRest,
# HdfPermissionBridge, HsdsClient) at build time so JAX-RS scanning picks
# them up when the plugin is on the classpath.
quarkus.index-dependency.shepard-plugin-hdf5.group-id=de.dlr.shepard.plugins
quarkus.index-dependency.shepard-plugin-hdf5.artifact-id=shepard-plugin-hdf5
# PL1d — same shape. Ensures Quarkus indexes the `shepard-plugin-git` JAR's
# CDI beans (GitReferenceService, GitReferenceRest, MeCredentialsRest,
# GitAdapterRegistry, GitArtifactCache) at build time so JAX-RS scanning picks
# them up when the plugin is on the classpath.
quarkus.index-dependency.shepard-plugin-git.group-id=de.dlr.shepard.plugins
quarkus.index-dependency.shepard-plugin-git.artifact-id=shepard-plugin-git
# FS1b — same shape. Ensures Quarkus indexes the `shepard-plugin-file-s3` JAR's
# CDI bean (S3FileStorage) at build time so FileStorageRegistry discovers it.
quarkus.index-dependency.shepard-plugin-file-s3.group-id=de.dlr.shepard.plugins
quarkus.index-dependency.shepard-plugin-file-s3.artifact-id=shepard-plugin-file-s3
# Per-plugin runtime toggle: `shepard.plugins.<id>.enabled=true|false`.
# The toggle defaults to `false` — all plugins are opt-in (V6 posture).
# Operators flip via PATCH /v2/admin/plugins/{id}/enabled or
# `shepard-admin plugins {enable,disable} <id>`. Disabled plugins are
# discovered + tracked but their `onRegister` lifecycle hook is skipped.
# Uncomment (or add) lines below to enable bundled plugins at install time.
shepard.plugins.unhide.enabled=true
shepard.plugins.kip.enabled=true
shepard.plugins.minter-local.enabled=true
shepard.plugins.minter-datacite.enabled=false
# KIP1c — ePIC handle service minter plugin default off (requires operator-configured
# ePIC API credentials). Operators enabling ePIC minting must set
# shepard.minters.epic.api-base-url, shepard.minters.epic.handle-prefix,
# and the credential via POST /v2/admin/minters/epic/credential before enabling.
shepard.plugins.minter-epic.enabled=false
# SPI1a — spatial plugin enabled by default (mirrors the pre-extraction posture
# where spatial was always compiled into the backend image). Operators without
# a PostGIS datasource set shepard.infrastructure.spatial.enabled=false to
# keep the toggle in the registry but inactive.
shepard.plugins.spatial.enabled=true
# PL1c — hdf5 plugin default off, mirrors the pre-extraction posture where
# shepard.hdf.enabled=false was the install default. Operators enabling HDF5
# must also set shepard.hdf.enabled=true and configure shepard.hdf.hsds.*
# credentials before flipping this toggle.
shepard.plugins.hdf5.enabled=false
# PL1d — git plugin enabled by default (mirrors pre-extraction posture where
# git references were always compiled into the backend). Operators without
# any git host integrations can disable this toggle.
shepard.plugins.git.enabled=true
# FS1b — file-s3 plugin default off (requires explicit S3 config). Operators
# enabling S3 storage must also set shepard.storage.provider=s3 and configure
# shepard.files.s3.* before flipping this toggle.
shepard.plugins.file-s3.enabled=false

# FS1b — S3-compatible file storage config. All keys are deploy-time-only
# per CLAUDE.md "cluster identity / topology" exception (switching the storage
# backend re-points the bytes pipeline; not safely runtime-flippable).
# Uncomment and configure to use S3 storage (set shepard.storage.provider=s3).
# Any S3-compatible endpoint works — Garage (quick-start), AWS S3, Cloudflare R2,
# Backblaze B2, Wasabi, MinIO, SeaweedFS, Ceph RGW. See aidocs/45 §3a + §3.2.
#shepard.files.s3.endpoint=http://shepard-garage:3900
#shepard.files.s3.region=us-east-1
#shepard.files.s3.access-key-id=
#shepard.files.s3.secret-access-key=
#shepard.files.s3.bucket=shepard
#shepard.files.s3.path-style-access=true

# PM1b2 — JAR signature verification + semver-range enforcement of
# PluginManifest.shepardCompatibility(). All five keys default-safe
# (signing required=false matches the current state where shipped
# plugin JARs are unsigned; compatibility strict=true matches the
# behaviour of "plugins register if their manifest looks sane" —
# enforcing the range that every PluginManifest already declares).
# To enable signed-plugin enforcement: set
# `shepard.plugins.signing.required=true` and point the truststore
# keys at a JKS / PKCS12 file with the trusted publisher's cert.
# See docs/reference/plugins.md §"Signing + compatibility enforcement"
# for the operator runbook.
shepard.plugins.signing.required=false
shepard.plugins.signing.trust-anchors=
shepard.plugins.signing.truststore.path=
shepard.plugins.signing.truststore.password=
# Strict semver-range enforcement of PluginManifest.shepardCompatibility().
# Default true — incompatible plugins land in FAILED state (visible in
# `GET /v2/admin/plugins` with `failureMessage` carrying
# `plugin.compatibility.failed: requires shepard <range>, running <version>`).
# Set false to override (incompatible plugins register anyway with a
# loud WARN — operator escape valve for a 5.2.0 → 5.3.0 fork bump
# where a vendor's manifest hasn't been refreshed yet).
shepard.plugins.compatibility.strict=true

# KIP1a / KIP1h — active PID minter. Default `local` matches the
# `shepard-plugin-minter-local` plugin's id (the renamed pre-KIP1h
# in-core `MockMinter`, shipped as a drop-in JAR per CLAUDE.md
# plugin-first heuristic #3). Switch to `epic` (KIP1c) or `datacite`
# (KIP1d) once those plugins ship. Set to `none` (or leave blank) to
# disable the publish endpoint without uninstalling minter plugins —
# the KIP resolver keeps working against pre-existing :Publication
# rows. Deploy-time-only per CLAUDE.md "cluster identity / topology"
# exception — switching the active PID provider is a re-bootstrap
# decision; runtime flips would orphan in-flight publications.
shepard.publish.minter=local

# FS1a — active file-payload storage adapter. Default `gridfs`
# matches the in-core `GridFsFileStorage` (a wrapper around the
# legacy `FileService` GridFS path; behaviour-equivalent to upstream
# shepard 5.2.0). FS1b adds `shepard-plugin-file-s3` for any
# S3-compatible endpoint (AWS S3, Cloudflare R2, Backblaze B2,
# Wasabi, Garage, SeaweedFS, Ceph RGW, MinIO) — set to `s3` once
# the plugin is installed under `plugins/storage-s3/`. Set to
# `none` (or leave blank) to disable file payloads at the API
# surface while keeping rows readable post-FS1e migration sweep.
# Deploy-time-only per CLAUDE.md "cluster identity / topology"
# exception — switching the storage backend re-points the bytes
# pipeline, which is not safely runtime-flippable (it would
# orphan in-flight writes and break existing-row reads until the
# FS1e migration sweep completes). See aidocs/45 §3.2 +
# docs/reference/file-storage.md.
shepard.storage.provider=gridfs

# UH1a — Helmholtz Unhide publish plugin. All four runtime knobs are
# admin-configurable at runtime via PATCH /v2/admin/unhide/config + the
# `shepard-admin unhide ...` CLI parity; the properties below seed the
# :UnhideConfig singleton on first start (so an operator who IaC-pins
# the deploy default still gets the runtime field as the source of
# truth post-PATCH — same precedence pattern as A3b features + N1c2
# semantic config). See aidocs/67 §5.2 + CLAUDE.md "admin-configurable".
#
# Default false: a fresh install never accidentally exposes a feed an
# operator hasn't reviewed. Flip via PATCH or `shepard-admin unhide
# enable` once the contact email + harvest key are in place.
shepard.unhide.enabled=false
# Default false: feed metadata may be licensed; operators opt in to
# public exposure. When false, /v2/unhide/feed.jsonld requires either
# X-API-KEY matching the harvest-key hash OR an instance-admin caller.
shepard.unhide.feed.public=false
# Surfaced in feed metadata so Unhide's harvester can contact the
# operating institution. Empty default = no contact email surfaced.
shepard.unhide.contact-email=
# Cursor-paginated feed page size. NOT runtime-mutable (per
# aidocs/67 §5.2 + CLAUDE.md "Buffer sizes / page sizes" exception:
# no operator demand for per-page-size tuning; the design is the
# Unhide harvester walks the full feed once a day). Capped at 1000.
shepard.unhide.feed.page-size=100
# N1c2 — filesystem directory under which operator-uploaded
# ontology bundles (uploaded via POST /v2/admin/semantic/ontologies)
# live as `<bundle-id>.ttl` files. Deploy-time only per the
# filesystem-topology exception in aidocs/65 §2.3 — runtime moves
# of the directory aren't supported (the on-disk path is mapped
# 1:1 to the catalogue rows in :UserOntologyBundle).
#
# In container deployments, bind-mount this path so uploads
# survive container restarts. The user `shepard` runs as must
# have +rwx on the directory.
shepard.semantic.internal.user-bundles-dir=/var/lib/shepard/ontologies/
# UH1b — how many of the most-recent :Activity rows targeting each
# Collection to embed in the feed entry's m4i:hasProcessingStep
# array. NOT runtime-mutable (same "Buffer sizes / page sizes"
# exception as feed.page-size — no operator demand to tune the
# provenance window at runtime; an operator who wants more / fewer
# steps in the feed can flip the deploy-time value at install /
# upgrade). Default 5 is the "what changed lately" eye-test —
# enough to give Unhide a representative slice without bloating
# every feed entry. Capped at 100. When a Collection has zero
# activities the field is omitted entirely (absent-field, not [],
# not null) per JSON-LD "no provenance available" semantics.
shepard.unhide.feed.provenance-window=5

# KIP1d — DataCite Fabrica DOI minter plugin. Runtime knobs that
# survive restart live on the :DataciteMinterConfig singleton; the
# keys below seed the singleton on first start (same precedence
# pattern as UH1a + N1c2 + A3b — runtime PATCH wins, deploy-time
# is just the IaC-shipped install default). Operators flip these
# via `shepard-admin minters datacite ...` or
# PATCH /v2/admin/minters/datacite/config once the plugin JAR is
# on the classpath.
#
# Default false: a fresh install never accidentally hits DataCite
# without an operator's review. Flip via PATCH or the CLI's `enable`
# verb once credentials + prefix are in place.
shepard.minters.datacite.enabled=false
# DataCite REST API base URL. Default points at Fabrica test
# (api.test.datacite.org) — the safe environment for a fresh install
# to experiment in. Production is `https://api.datacite.org`. Flip
# at runtime when ready: `shepard-admin minters datacite set-api-url https://api.datacite.org`.
shepard.minters.datacite.api-base-url=https://api.test.datacite.org
# DataCite-allocated DOI prefix — e.g. `10.5072` for Fabrica test,
# a member-specific prefix in production. Required for mint to
# succeed (DataciteMinter throws MinterException when blank). Empty
# install default — operators MUST set this at first run.
shepard.minters.datacite.handle-prefix=
# DataCite Member account login — the HTTP Basic auth user portion.
# Required for mint. Empty install default — operators MUST set.
shepard.minters.datacite.repository-id=
# Publisher name embedded in every minted DOI's metadata (DataCite's
# `publisher` attribute — DataCite requires a non-empty value).
# Typically the host institution's official name. Empty default.
shepard.minters.datacite.publisher=
# Base URL prepended to /<kind>/<appId> when building the DOI's
# `url` attribute (DataCite resolves the DOI to this). E.g.
# `https://shepard.example.dlr.de/v2`. Required for mint to produce
# a working resolution.
shepard.minters.datacite.landing-page-base=
# Default DOI state on mint — one of draft / registered / findable.
# `draft` is the safest default: misconfigured mints can be deleted
# DataCite-side. Operators promote draft DOIs via the Fabrica UI or
# by re-minting (Phase 2). Other values: `registered` (committed,
# resolvable, not findable in DataCite Commons), `findable` (fully
# discoverable). Validated server-side — anything else rejected.
shepard.minters.datacite.default-state=draft
# NOTE: shepard.minters.datacite.password is NOT a deploy-time key.
# Set the DataCite Member password via the admin REST or CLI only:
#   shepard-admin minters datacite set-password   (prompts via stdin)
# or POST /v2/admin/minters/datacite/credential. The plaintext is
# encrypted with AES-GCM keyed off shepard.instance.id and stored on
# :DataciteMinterConfig.passwordCipher. Gitleaks would flag a
# plaintext password in application.properties as a credential leak.

# ROR1 — instance-level Research Organization Registry config
# Set rorId to enrich RO-Crate exports and KIP provenance records.
# See: https://ror.org
# Both fields are configured at runtime via PATCH /v2/admin/instance/ror
# (instance-admin only). No deploy-time defaults are needed — the
# :InstanceRorConfig singleton starts blank and is populated by operators.

# G1b — Git tracked-artifact adapter + preview cache. All default-safe.
# `shepard.git.adapter.timeout` bounds each per-host HTTP call.
shepard.git.adapter.timeout=PT15S
# Extra hostnames (CSV) that the GitLab adapter should claim on top of the
# default "any host containing 'gitlab'" rule. Useful for self-hosted
# GitLab behind a non-obvious DNS name (e.g. code.dlr.de).
shepard.git.adapter.gitlab.hosts=
# G1d — extra hostnames (CSV) that the GitHub adapter should claim on top
# of the default "github.com or *.github.com" rule. Useful for GitHub
# Enterprise behind a non-obvious DNS name (e.g. github.example.dlr.de).
shepard.git.adapter.github.hosts=
# G1d — extra hostnames (CSV) that the Gitea adapter should claim on top
# of the default "any host containing 'gitea'" rule. Useful for self-hosted
# Gitea / Forgejo (e.g. codeberg.org).
shepard.git.adapter.gitea.hosts=
# Per-(user, repoUrl, ref, path) cache TTL + max-size for the inline preview.
shepard.git.cache.ttl=PT5M
shepard.git.cache.max-size=1000
# Files larger than this are returned with contentTruncated=true (no body)
# so the UI falls back to an "open in GitLab" link. 1 MiB default.
shepard.git.preview.max-bytes=1048576
quarkus.cache.caffeine."git-artifacts".expire-after-write=${shepard.git.cache.ttl}
quarkus.cache.caffeine."git-artifacts".maximum-size=${shepard.git.cache.max-size}
quarkus.cache.caffeine."git-artifacts".metrics-enabled=true

# AAS1-reg — outbound IDTA AAS Registry registration (aidocs/52 §4a.1).
# All three keys are optional. When `shepard.aas.registry.url` is absent,
# no startup sync is performed and the well-known `registryRegistrations`
# list falls back to an empty list.
#
# shepard.aas.registry.url=https://registry.example.org
# shepard.aas.registry.api-key=<bearer-token>   (omit when the registry is open)
# shepard.aas.base-url=https://shepard.example.org  (used in endpoint href inside the ShellDescriptor)

