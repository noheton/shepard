# P4: root-path is now `/`. The upstream-frozen surface lives under
# /shepard/api/... via explicit class-level @Path("/shepard/api/...")
# (see Constants.SHEPARD_API); new /v2/... resources mount directly at
# /v2/... under de.dlr.shepard.v2. Fenced by V2NamespaceTest.
quarkus.http.root-path=/
# `non-application-root-path` is absolute — unaffected by the root-path
# change. OpenAPI / Swagger UI / health endpoints continue to resolve
# under /shepard/doc/...
quarkus.http.non-application-root-path=/shepard/doc
quarkus.shutdown.timeout=PT10S

# Health check
quarkus.smallrye-health.root-path=/shepard/api/healthz
quarkus.smallrye-health.openapi.included=true
# Disable the default health check from the JDBC
quarkus.datasource.health.enabled=false
# Disable default MongoDB extention health check
quarkus.mongodb.health.enabled=false
# Maximum age of the last successful per-DB ping for readiness to report UP
shepard.health.readiness.max-staleness=PT30S
# Interval at which the recovery scheduler re-pings stale required DBs
shepard.health.recovery.interval=PT15S


#version endpoint
shepard.version=${project.version}

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,HEAD,OPTIONS,DELETE,PUT,PATCH
quarkus.http.cors.headers=Origin,Accept,X-Requested-With,Content-Type,Access-Control-Request-Method,Access-Control-Request-Headers,Authorization,X-API-KEY

# Logging
quarkus.console.color=true
quarkus.log.level=INFO
quarkus.log.min-level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss.SSS} [%p] [%c{5.}] (%t) %s%e%n
quarkus.log.file.enabled=true
quarkus.log.file.path=logs/shepard.log
# https://docs.redhat.com/en/documentation/red_hat_build_of_quarkus/3.2/html/logging_configuration/logging-configuration#root-logger-configuration
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5p] [%c] (%t) %s%e%n
quarkus.log.file.level=INFO
quarkus.log.file.rotation.max-backup-index=10
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd

# Turn off warnings from deprecated neo4j cypher statements
quarkus.log.category."org.neo4j.ogm.drivers.bolt.response.BoltResponse.deprecation".level=OFF
quarkus.log.category."org.neo4j.ogm.drivers.bolt.response.BoltResponse.unrecognized".level=OFF

# Logging settings for neo4j queries
quarkus.log.category."org.neo4j.ogm.drivers.bolt.request.BoltRequest".level=INFO
quarkus.log.category."de.dlr.shepard.common.neo4j.daos.GenericDAO".level=INFO

# Turn off info messages of PKIHelper because it is flooding our logs
quarkus.log.category."de.dlr.shepard.common.util.PKIHelper".level=WARN

# MongoDB
quarkus.mongodb.connection-string=mongodb://mongo@mongodb:27017

# TimescaleDB

quarkus.datasource.db-kind=postgresql
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration,classpath:de/dlr/shepard/data/timeseries/migrations
# Bound the Flyway startup wait to ~50s so it fails fast inside the same
# 60s window as shepard.migrations.connection-wait-timeout (Neo4j).
# Default interval is 120s, which alone exceeds the ceiling.
quarkus.flyway.connect-retries=10
quarkus.flyway.connect-retries-interval=PT5S
quarkus.hibernate-orm.packages=de.dlr.shepard.data.timeseries

# Spatial Database
# https://quarkus.io/guides/flyway#multiple-datasources
quarkus.datasource.spatial.db-kind=postgresql
quarkus.flyway.spatial.active=${shepard.spatial-data.enabled}
quarkus.flyway.spatial.baseline-on-migrate=true
quarkus.flyway.spatial.locations=db/spatial/migration
quarkus.flyway.spatial.migrate-at-start=true
# Same ~50s ceiling for the spatial Flyway datasource.
quarkus.flyway.spatial.connect-retries=10
quarkus.flyway.spatial.connect-retries-interval=PT5S

quarkus.hibernate-orm.spatial.active=${shepard.spatial-data.enabled}
quarkus.hibernate-orm.spatial.datasource=spatial
quarkus.hibernate-orm.spatial.packages=de.dlr.shepard.data.spatialdata.model

# OpenAPI & Swagger
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.operationIdStrategy=METHOD
quarkus.smallrye-openapi.store-schema-directory=target/openapi/
quarkus.smallrye-openapi.open-api-version=3.0.1
quarkus.smallrye-openapi.info-title=${project.name}
quarkus.smallrye-openapi.info-version=${project.version}
# keep scanning for annotations, while also using static openapi.yml template
mp.openapi.scan.disable=false
quarkus.smallrye-openapi.ignore-static-document=false
quarkus.smallrye-openapi.path=openapi.json

# Quarkus File Uploads
# Set unlimited max-body size for file uploads
# https://github.com/quarkusio/quarkus/wiki/Migration-Guide-1.6
quarkus.http.limits.max-body-size=

# Quarkus Metrics
# Enable Micrometer metrics support in general.
quarkus.micrometer.enabled=true

# Provide metrics as json on /metrics endpoint
quarkus.micrometer.export.json.enabled=true

# Activate/Deactivate http server metrics.
quarkus.micrometer.binder.http-server.enabled=true

# Netty uses memory allocators to pool the memory buffers for reuse.
quarkus.micrometer.binder.netty.enabled=true

# Activates/Deactivates metrics for the java virtual machine.
quarkus.micrometer.binder.jvm=true

# Activates/Deactivates metrics for the system.
quarkus.micrometer.binder.system=true

# Activates/Deactivates metrics for vertx.
quarkus.micrometer.binder.vertx.enabled=true

# Activates/Deactivates metrics for Hibernate.
quarkus.hibernate-orm.metrics.enabled=true

# Activates/Deactivates metrics for MongoDB.
quarkus.mongodb.metrics.enabled=true

# Enable exporting of metrics
quarkus.micrometer.export.json.path=metrics/json
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=metrics/prometheus

# Maximum total time the startup wait for the neo4j database connection retries before failing fast
shepard.migrations.connection-wait-timeout=PT60S

# Versioning Feature Toggle (runtime)
shepard.features.versioning.enabled=false

# Spatial Data Infrastructure Toggle
# Canonical key (A3c): shepard.infrastructure.spatial.enabled.
# Legacy alias shepard.spatial-data.enabled is still honoured and overrides the
# canonical default if set externally; it is deprecated for removal in v6.0.
shepard.infrastructure.spatial.enabled=false
shepard.spatial-data.enabled=${shepard.infrastructure.spatial.enabled}

# Automatically convert int values to double values in timeseries if there are already double values present
shepard.autoconvert-int=false

# NDJSON streaming ingest for timeseries data points (P14)
shepard.timeseries.ingest.ndjson.batch-size=5000
shepard.timeseries.ingest.ndjson.max-duration=PT5M

quarkus.cache.caffeine.maximum-size=8192
quarkus.cache.caffeine.expire-after-write=3h

# Permissions cache (per-cache overrides). TTL defaults to 5 minutes,
# max-size to 10000. Tunable via shepard.permissions.cache.* at runtime.
shepard.permissions.cache.ttl=PT5M
shepard.permissions.cache.max-size=10000
quarkus.cache.caffeine."permissions-service-cache".expire-after-write=${shepard.permissions.cache.ttl}
quarkus.cache.caffeine."permissions-service-cache".maximum-size=${shepard.permissions.cache.max-size}
# Expose Caffeine hit/miss/eviction/size as Micrometer time series for the permissions cache.
quarkus.cache.caffeine."permissions-service-cache".metrics-enabled=true

# Permission cache warming (opt-in). When enabled, the top-N most-used
# entities are pre-loaded into the permission cache on StartupEvent so the
# first request after restart skips the Neo4j round-trip.
shepard.permissions.cache.warm.enabled=false
shepard.permissions.cache.warm.max-entries=500

# A0 / C3 — default-owner for the V14 orphan-permissions backfill.
# Required at startup if any BasicEntity nodes lack a :has_permissions
# edge (post-C3 fail-closed flip in PermissionsService.getRoles).
# Operators upgrading from an older shepard with pre-permission entities
# MUST set this to an existing username (e.g. an instance-admin) before
# the next start, otherwise OrphanPermissionsBackfillContext aborts.
# Greenfield deployments can leave it unset.
shepard.permissions.default-owner=

# PROV1 — provenance / activity-log capture (aidocs/55).
# Master toggle; default on. Set to false to disable capture entirely
# (the /v2/provenance/activities endpoint still works against legacy
# rows, but no new rows land).
shepard.provenance.enabled=true
# Default: capture only mutating verbs (POST/PUT/PATCH/DELETE) on 2xx.
# Set to true to also capture read endpoints; comes with significant
# row-volume cost on read-heavy installs. See aidocs/55 §4.
shepard.provenance.capture-reads=false
# Stamped onto every Activity row. 'local' is the canonical central
# value; shepard Edge deployments (aidocs/60) override this with the
# per-Edge UUID so post-sync rows carry their origin.
shepard.instance.id=local

# A0 / F8 — configurable OIDC roles-claim path. Default targets
# Keycloak's `realm_access.roles` shape. Operators on Pocket ID /
# Authentik / Azure AD set this to the dot-path that carries their
# role-strings (e.g. `groups`, `roles`).
shepard.oidc.roles-claim-path=realm_access.roles

# A0 — name of the role-string within the IdP claim that maps to
# shepard's `instance-admin` role. Empty (default) = no IdP-side admin
# in this deployment; only Neo4j-internal :HAS_ROLE edges grant the
# role. Safe-by-default.
shepard.instance-admin.role=

# A0 — operator-configurable allowlist of roles that API keys may
# carry. Default is the singleton `[instance-admin]`; shrink to empty
# to forbid role-bearing keys entirely.
shepard.apikey.role-allowlist=instance-admin

# A0 — path for the bootstrap token written by
# BootstrapTokenInitializer when no instance-admin exists. Mode 0600
# on POSIX. Override for containers / non-root deployments.
shepard.bootstrap.token-path=/opt/shepard/.bootstrap-token

# Dev Profile
%dev.quarkus.mongodb.connection-string=mongodb://username:password@127.0.0.1:27017/database

%dev.neo4j.host=127.0.0.1:7687
%dev.neo4j.username=neo4j
%dev.neo4j.password=shepardshepard

%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://127.0.0.1:5432/postgres
%dev.quarkus.datasource.username=shepard
%dev.quarkus.datasource.password=shepard_secret

%dev.quarkus.datasource.spatial.jdbc.url=jdbc:postgresql://127.0.0.1:5433/postgres
%dev.quarkus.datasource.spatial.username=shepard
%dev.quarkus.datasource.spatial.password=shepard_secret

%dev.shepard.features.versioning.enabled=false

%dev.shepard.infrastructure.spatial.enabled=true
%dev.quarkus.flyway.spatial.active=true
%dev.quarkus.hibernate-orm.spatial.active=true

%dev.shepard.autoconvert-int=false


# Define test Profile to Extend the dev profile
%test.quarkus.config.profile.parent=dev
quarkus.hibernate-orm.mapping.format.global=ignore
