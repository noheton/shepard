# This migration calls refresh_continuous_aggregate(), which TimescaleDB
# forbids inside a transaction block ("cannot run inside a transaction
# block"). Flyway wraps each script in a transaction by default; disable
# that for this one script so the CALL runs in autocommit mode.
#
# On a from-scratch cluster this is the first migration to actually execute
# a live refresh (V1.12.1 creates the CAgg WITH NO DATA and only documents
# the refresh in a comment), so without this the backend fails to boot on a
# freshly reset instance. See docs/admin/runbooks/13-full-instance-reset.md.
executeInTransaction=false
