services:
  backend:
    image: registry.gitlab.com/dlr-shepard/shepard/backend:5.2.0
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xms2G -Xmx2G"
      OIDC_PUBLIC: ${OIDC_PUBLIC}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY}
      OIDC_ROLE: ${OIDC_ROLE}
      INFLUX_HOST: influxdb:8086
      INFLUX_USERNAME: admin
      INFLUX_PASSWORD: ${INFLUX_PW}
      NEO4J_HOST: neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PW}
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_SHEPARD_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_SHEPARD_USER_PW}
      QUARKUS_DATASOURCE_SPATIAL_JDBC_URL: jdbc:postgresql://postgis:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_SPATIAL_USERNAME: ${POSTGRES_SHEPARD_USER}
      QUARKUS_DATASOURCE_SPATIAL_PASSWORD: ${POSTGRES_SHEPARD_USER_PW}
      SHEPARD_MIGRATION_MODE_ENABLED: ${SHEPARD_MIGRATION_MODE_ENABLED}
      SHEPARD_SPATIAL_DATA_ENABLED: ${SHEPARD_SPATIAL_DATA_ENABLED}
      SHEPARD_AUTOCONVERT_INT: ${SHEPARD_AUTOCONVERT_INT}
    volumes:
      - /opt/shepard/backend/logs:/deployments/logs
      - /opt/shepard/backend/config:/home/default/.shepard
    depends_on:
      - neo4j
      - mongodb
      - timescaledb
    networks:
      - shepard

  frontend-old:
    image: registry.gitlab.com/dlr-shepard/shepard/frontend:4.0.0
    environment:
      VUE_APP_BACKEND: ${BACKEND_URL}shepard/api
      VUE_APP_OIDC_AUTHORITY: ${OIDC_AUTHORITY}
      VUE_APP_CLIENT_ID: ${CLIENT_ID}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - frontend
    profiles:
      - frontend-old

  frontend:
    image: registry.gitlab.com/dlr-shepard/shepard/frontend:5.2.0
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_BACKEND_API_URL: ${BACKEND_URL}shepard/api
      AUTH_ORIGIN: ${FRONTEND_URL}api/auth
      NUXT_AUTH_SECRET: ${FRONTEND_AUTH_SECRET}
      NUXT_OIDC_CLIENT_ID: ${CLIENT_ID}
      NUXT_OIDC_ISSUER: ${OIDC_AUTHORITY}
      SESSION_REFRESH_INTERVAL: ${SESSION_REFRESH_INTERVAL}
    depends_on:
      - backend
    networks:
      - frontend

  neo4j:
    # For instructions on how to update Neo4j from version 4.4 to 5.24, please read the migration guide at: https://gitlab.com/dlr-shepard/shepard/-/merge_requests/315#goal_net-description
    # Upgraded to 5.26: the n10s Labs registry only lists ≥ 5.26; store migration is automatic within 5.x.
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PW}
      NEO4J_server_memory_heap_initial__size: 2G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 3G
      # N1a — install the neosemantics ("n10s") plugin so shepard's
      # internal `SemanticRepositoryType.INTERNAL` connector has a backend.
      # The official neo4j image's NEO4J_PLUGINS list fetches+verifies the
      # plugin jar on startup (see https://neo4j.com/docs/operations-manual/5/docker/plugins/).
      # If an air-gapped operator can't reach the plugin CDN, drop the jar
      # into /opt/shepard/neo4j/plugins by hand and remove this env var —
      # the n10s bootstrap hook gracefully degrades when the procedures
      # aren't found.
      NEO4J_PLUGINS: '["n10s"]'
      # n10s exposes procedures under the `n10s.*` namespace; both lists
      # must include it or `CALL n10s.graphconfig.init` is denied.
      # APOC is included pre-emptively because most shepard deployments
      # eventually want it; remove if your policy is strictly minimal.
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,n10s.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,n10s.*"
    ports:
      - "7687:7687"
    volumes:
      - /opt/shepard/neo4j/logs:/logs
      - /opt/shepard/neo4j/plugins:/plugins
      - /opt/shepard/neo4j/data:/var/lib/neo4j/data
    restart: unless-stopped
    networks:
      - shepard

  mongodb:
    # Please only update the MongoDB incrementally, follow this guide if you need help: https://gitlab.com/dlr-shepard/shepard/-/merge_requests/306
    image: mongo:8.0.4
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - /opt/shepard/mongodb/db:/data/db
      - /opt/shepard/mongodb/configdb:/data/configdb
      - ./docker-entrypoint-initdb.d/mongodb/00-create-mongo-user.js:/docker-entrypoint-initdb.d/00-create-mongo-user.js
    restart: unless-stopped
    networks:
      - shepard
      - mongo
    command: --wiredTigerCacheSizeGB 2.0

  mongoexpress:
    image: mongo-express:latest
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
    restart: unless-stopped
    depends_on:
      - mongodb
    networks:
      - mongo

  timescaledb:
    image: timescale/timescaledb:2.24.0-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SHEPARD_USER: ${POSTGRES_SHEPARD_USER}
      POSTGRES_SHEPARD_USER_PW: ${POSTGRES_SHEPARD_USER_PW}
      PGDATA: /var/lib/postgres/data
    volumes:
      - /opt/shepard/timescaledb:/var/lib/postgres/data
      - ./docker-entrypoint-initdb.d/postgres/00-init-postgres-db.sh:/docker-entrypoint-initdb.d/00-init-postgres-db.sh
    restart: unless-stopped
    networks:
      - shepard

  postgis:
    image: postgis/postgis:16-3.5
    container_name: postgis
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SHEPARD_USER: ${POSTGRES_SHEPARD_USER}
      POSTGRES_SHEPARD_USER_PW: ${POSTGRES_SHEPARD_USER_PW}
    shm_size: "6GB"
    ports:
      - "5433:5432"
    volumes:
      - ./docker-entrypoint-initdb.d/postgis/00-init-postgis-db.sh:/docker-entrypoint-initdb.d/00-init-postgis-db.sh
      - /opt/shepard/postgis/db:/var/lib/postgresql/data
    networks:
      - shepard
    restart: unless-stopped
    profiles:
      - spatial

  # A5a — HDF5 / HSDS sidecar (Phase 1). Off by default; bring up with
  #   docker compose --profile hdf up -d
  # The shepard backend talks to this service over plain HTTP Basic
  # in Phase 1 (admin creds via HSDS_USERNAME / HSDS_PASSWORD below
  # — change these and the backend's matching shepard.hdf.hsds.*
  # keys before deploying anywhere reachable from the internet!).
  # Per aidocs/35 §3 the POSIX storage backend is the default for
  # the all-in-one stack; S3 / Azure are opt-in via additional env
  # vars supported by HSDS upstream (HSDS_AWS_S3_GATEWAY etc.).
  shepard-hsds:
    image: hdfgroup/hsds:v0.9.5
    container_name: shepard-hsds
    environment:
      BUCKET_NAME: ${HSDS_BUCKET_NAME:-shepard}
      HSDS_USERNAME: ${HSDS_USERNAME:-admin}
      HSDS_PASSWORD: ${HSDS_PASSWORD:-admin}
      LOG_LEVEL: ${HSDS_LOG_LEVEL:-INFO}
    ports:
      - "5101:5101"
    volumes:
      # POSIX backend — keep data on the host next to the other
      # shepard volumes so the operator backup story is the same
      # shape as Neo4j / Mongo / TimescaleDB.
      - ./hsds-storage:/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:5101/about || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - shepard
    restart: unless-stopped
    profiles:
      - hdf

  # FS1b + FS1d — S3-compatible object storage sidecar (Garage). Off by default;
  # bring up with:
  #   docker compose --profile files-s3 up -d
  #
  # Garage is a lightweight (~10 MB Rust binary, MIT-licensed) geo-distributed
  # S3-compatible object store — the ADR-0024 reference for the quick-start stack.
  # Any S3-compatible endpoint works; replace with AWS S3, Cloudflare R2, MinIO,
  # etc. by pointing shepard.files.s3.* at your own endpoint.
  #
  # After starting, initialise the cluster once:
  #   docker exec shepard-garage /garage layout assign -z dc1 -c 1G <node-id>
  #   docker exec shepard-garage /garage layout apply --version 1
  #   docker exec shepard-garage /garage bucket create shepard
  #   docker exec shepard-garage /garage key create shepard-backend
  #   docker exec shepard-garage /garage bucket allow --read --write shepard --key shepard-backend
  # Then set shepard.storage.provider=s3 in application.properties (or SHEPARD_STORAGE_PROVIDER env var).
  # The access-key-id and secret-access-key are printed by `garage key info shepard-backend`.
  # See docs/reference/file-storage.md for the full operator runbook.
  shepard-garage:
    image: dxflrs/garage:v1.0.1
    container_name: shepard-garage
    command: /garage server
    environment:
      GARAGE_METADATA_DIR: /var/lib/garage/meta
      GARAGE_DATA_DIR: /var/lib/garage/data
      GARAGE_REPLICATION_FACTOR: "1"
      GARAGE_RPC_BIND_ADDR: "0.0.0.0:3901"
      GARAGE_API_S3_BIND_ADDR: "0.0.0.0:3900"
      GARAGE_ADMIN_BIND_ADDR: "0.0.0.0:3903"
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-a8f3d2c1b4e5a6f7d8e9c0b1a2f3d4e5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d}
    ports:
      - "3900:3900"
    volumes:
      - ./garage-data:/var/lib/garage
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:3903/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - shepard
    restart: unless-stopped
    profiles:
      - files-s3

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./proxy/ssl:/etc/caddy/ssl:ro
      - ./proxy/shepard:/var/www/shepard:ro
      - /opt/shepard/caddy/data:/data
      - /opt/shepard/caddy/config:/config
    restart: unless-stopped
    networks:
      - shepard
      - mongo
      - influxdata
      - frontend

  timescale-migration-preparation:
    image: registry.gitlab.com/dlr-shepard/shepard/timescale-migration-preparation:5.0.1
    volumes:
      - ./log:/app/log
    env_file:
      - .env
    depends_on:
      - influxdb
      - neo4j
    networks:
      - shepard
    profiles:
      - timescale-migration-preparation

  prometheus:
    image: prom/prometheus:v3.9.1
    command:
      - --web.enable-remote-write-receiver
      - --enable-feature=native-histograms
      - --config.file=/etc/prometheus/prometheus.yml
    networks:
      - shepard
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-storage:/prometheus
    restart: unless-stopped
    profiles:
      - monitoring

  # Out-of-the-box performance-metrics dashboard for the
  # `monitoring` compose profile. Auto-provisions:
  #   * a Prometheus datasource pointing at prometheus:9090
  #   * an "shepard — Overview" dashboard with HTTP / JVM / DB /
  #     permission-cache panels
  # Reachable at http://localhost:3001 after
  # `docker compose --profile monitoring up -d`.
  grafana:
    image: grafana/grafana:12.2.1-security-01
    networks:
      - shepard
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  shepard:
  mongo:
  influxdata:
  frontend:

volumes:
  grafana-storage: {}
  prometheus-storage: {}
