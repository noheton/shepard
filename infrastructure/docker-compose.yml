services:
  backend:
    image: registry.gitlab.com/dlr-shepard/shepard/backend:latest
    restart: unless-stopped
    environment:
      JAVA_OPTS: "-Xms2G -Xmx2G"
      OIDC_PUBLIC: ${OIDC_PUBLIC}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY}
      OIDC_ROLE: ${OIDC_ROLE}
      INFLUX_HOST: influxdb:8086
      INFLUX_USERNAME: admin
      INFLUX_PASSWORD: ${INFLUX_PW}
      NEO4J_HOST: neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PW}
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://mongo:${MONGO_PW}@mongodb:27017

    volumes:
      - /opt/shepard/backend/logs:/deployments/logs
      - /opt/shepard/backend/config:/home/jboss/.shepard
    depends_on:
      - neo4j
      - mongodb
      - influxdb
    networks:
      - shepard

  frontend:
    image: registry.gitlab.com/dlr-shepard/shepard/frontend:latest
    environment:
      VUE_APP_BACKEND: ${BACKEND_URL}shepard/api
      VUE_APP_OIDC_AUTHORITY: ${OIDC_AUTHORITY}
      VUE_APP_CLIENT_ID: ${CLIENT_ID}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - frontend

  neo4j:
    image: neo4j:4.4
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PW}
      NEO4J_dbms_memory_heap_initial__size: 2G
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 3G
    ports:
      - "7687:7687"
    volumes:
      - /opt/shepard/neo4j/logs:/logs
      - /opt/shepard/neo4j/plugins:/plugins
      - /opt/shepard/neo4j/data:/var/lib/neo4j/data
    restart: unless-stopped
    networks:
      - shepard

  mongodb:
    image: mongo:4.4
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PW}
      MONGO_INITDB_DATABASE: database
    volumes:
      - /opt/shepard/mongodb/db:/data/db
      - /opt/shepard/mongodb/configdb:/data/configdb
    restart: unless-stopped
    networks:
      - shepard
      - mongo
    command: --wiredTigerCacheSizeGB 2.0

  mongoexpress:
    image: mongo-express:latest
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: mongo
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PW}
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_ADMINUSERNAME: mongo
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PW}
    restart: unless-stopped
    depends_on:
      - mongodb
    networks:
      - mongo

  influxdb:
    image: influxdb:1.8-alpine
    environment:
      IFLUXDB_ADMIN_ENABLED: "true"
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: ${INFLUX_PW}
      INFLUXDB_LOGGING_LEVEL: warn
      INFLUXDB_HTTP_LOG_ENABLED: "false"
      INFLUXDB_DATA_CACHE_MAX_MEMORY_SIZE: 2G
    volumes:
      - /opt/shepard/influxdb:/var/lib/influxdb
    restart: unless-stopped
    networks:
      - shepard
      - influxdata

  chronograf:
    image: chronograf:1.9-alpine
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_USERNAME: admin
      INFLUXDB_PASSWORD: ${INFLUX_PW}
    volumes:
      - /opt/shepard/chronograf:/var/lib/chronograf
    restart: unless-stopped
    depends_on:
      - influxdb
    networks:
      - influxdata

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./proxy/ssl:/etc/caddy/ssl:ro
      - ./proxy/shepard:/var/www/shepard:ro
      - /opt/shepard/caddy/data:/data
      - /opt/shepard/caddy/config:/config
    restart: unless-stopped
    networks:
      - shepard
      - mongo
      - influxdata
      - frontend

networks:
  shepard:
  mongo:
  influxdata:
  frontend:
