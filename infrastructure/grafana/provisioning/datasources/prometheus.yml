# Auto-provisioned datasource for the shepard `monitoring` compose
# profile. Loaded by Grafana on startup; survives container restarts
# via the `grafana-storage` volume but is re-applied on each boot so
# `prometheus:9090` stays canonical.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "10s"
      httpMethod: "POST"
