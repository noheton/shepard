# Dev/deployment override — fork images + direct port exposure.
# Zoraxy handles TLS termination upstream; no Caddy needed for dev.
#
# External routing (via Zoraxy):
#   https://shepard.nuclide.systems     → 192.168.1.49:80  → frontend:3000
#   https://shepard-api.nuclide.systems → 192.168.1.49:8080 → backend:8080
#   https://shepard-auth.nuclide.systems → 192.168.1.49:8082 → keycloak directly
#
# The `Deploy to test instance` workflow sets SHEPARD_BACKEND_IMAGE /
# SHEPARD_FRONTEND_IMAGE env vars before invoking `docker compose pull && up -d`.
#
# Demo seeding: the `seeder` service runs once after the backend is healthy.
# It bootstraps the admin user, creates an API key, and runs seed.py.
# On subsequent `docker compose up` the seeder exits immediately (seed is idempotent).
# To re-seed from scratch: docker compose run --rm seeder bash -c "cd /seed && python seed.py --reset --regenerate --host http://backend:8080/shepard/api --apikey <key>"
#
# Post-deployment verification: after `docker compose up -d`, run
#   ./smoke-test.sh
# to catch the regressions we've actually hit on this fork (frontend SSR
# crash from a skipped patch-output.mjs, backend missing REST classes,
# Quarkus config crashes, Flyway duplicate-version migrations). Set
# FRONTEND_URL / BACKEND_URL to point at the public hostnames when
# verifying a remote deploy.

services:
  backend:
    image: ${SHEPARD_BACKEND_IMAGE:-shepard-backend-patched:local}
    ports:
      - "8080:8080"
    environment:
      # Internal HTTP URL so the backend can reach Keycloak for OIDC discovery
      # without going through the public internet. Keycloak's KC_HOSTNAME forces
      # the issuer in the discovery doc and in tokens to the public HTTPS URL,
      # so Quarkus validates `iss` correctly against the discovery-doc issuer.
      OIDC_AUTHORITY: "http://shepard-auth.nuclide.systems:8082/realms/shepard-demo"
      # Write the one-shot bootstrap token to a volume shared with the seeder.
      SHEPARD_BOOTSTRAP_TOKEN_PATH: "/opt/shepard-bootstrap/.bootstrap-token"
      # Quarkus 3.27 treats empty-string @ConfigProperty defaults as required
      # (the build step registers null defaultValue in ConfigValidationMetadata
      # and SmallRye Config rejects empty-string values for required properties).
      # These features are disabled on the demo instance; the values are
      # intentional no-op placeholders so the backend starts cleanly.
      SHEPARD_MINTERS_DATACITE_REPOSITORY_ID: "demo"
      SHEPARD_MINTERS_DATACITE_HANDLE_PREFIX: "demo"
      SHEPARD_MINTERS_DATACITE_PUBLISHER: "Demo Instance"
      SHEPARD_MINTERS_DATACITE_LANDING_PAGE_BASE: "http://localhost"
      SHEPARD_HDF_HSDS_USERNAME: "admin"
      SHEPARD_HDF_HSDS_PASSWORD: "admin"
      SHEPARD_UNHIDE_CONTACT_EMAIL: "admin@localhost"
      SHEPARD_PLUGINS_SIGNING_TRUSTSTORE_PATH: "none"
      SHEPARD_PLUGINS_SIGNING_TRUSTSTORE_PASSWORD: "none"
      SHEPARD_PLUGINS_SIGNING_TRUST_ANCHORS: "none"
      # FS1d — Garage S3 sidecar ACTIVATED 2026-05-22 per task #122 + the
      # runbook at docs/ops/garage-activation-runbook.md. Garage container
      # `shepard-garage` runs in this compose stack; backend reaches it via
      # the `shepard` docker network at hostname `garage:3900`. Credentials
      # below come from `docker exec shepard-garage /garage key create
      # shepard-backend` (shown ONCE at creation time; rotate via key-rotate
      # if compromised).
      SHEPARD_STORAGE_PROVIDER: "s3"
      SHEPARD_FILES_S3_ENDPOINT: "http://garage:3900"
      SHEPARD_FILES_S3_REGION: "garage-region"
      SHEPARD_FILES_S3_BUCKET: "shepard-files"
      SHEPARD_FILES_S3_PATH_STYLE_ACCESS: "true"
      SHEPARD_FILES_S3_ACCESS_KEY_ID: "GK6f1eb80a3f7237cda3cf5830"
      SHEPARD_FILES_S3_SECRET_ACCESS_KEY: "a01a7b7b0d5a694aa8817b7657835b688ee4bf422fdf3df3a4c8b8137bf1e5f5"
      SHEPARD_MIGRATION_AUTO_SWEEP_SOURCE: "none"
      SHEPARD_MIGRATION_AUTO_SWEEP_TARGET: "none"
      # SHACL-1 — audit-chain HMAC instance secret. Quarkus 3.27 rejects
      # empty-string @ConfigProperty defaults; this placeholder satisfies
      # validation. When set, it seeds :InstanceConfig on first start; the
      # service falls back to SecureRandom if it's blank, but Quarkus won't
      # let blank pass validation. Production deployments should override
      # with a stable, archived secret (see docs/reference/audit-trail.md).
      SHEPARD_AUDIT_INSTANCE_SECRET: "demo-instance-secret-placeholder-do-not-use-in-prod"
      # V1.7.0 (int_to_bigint) was applied manually to the DB but never
      # recorded in flyway_schema_history — set out-of-order so Flyway
      # applies it and registers it. Safe to keep permanently; subsequent
      # starts just see it as already-applied.
      QUARKUS_FLYWAY_OUT_OF_ORDER: "true"
      # C3: backfill orphan-permission edges for nodes created before the
      # has_permissions constraint was enforced. Set to the instance-admin sub.
      SHEPARD_PERMISSIONS_DEFAULT_OWNER: "a1c6b74a-d04d-4ee7-a509-20bd6a90cbf6"
      # OAS1 — public base URL surfaced in the OpenAPI `servers` list so
      # OpenAPI-Generator clients downloading the spec get an absolute URL.
      SHEPARD_PUBLIC_BASE_URL: "https://shepard-api.nuclide.systems"
      # CORS: list the frontend origins explicitly so the browser's
      # CORS-with-credentials gate succeeds. `*` is incompatible with
      # `credentials: include` per the spec; the spec REQUIRES an exact
      # origin echo when credentials are sent. Without these, every
      # PATCH/PUT/POST from the frontend fails with "ERR_FAILED 200" and
      # the misleading "Access-Control-Allow-Credentials must be true"
      # message in the browser console (root cause for the bug cluster
      # seen 2026-05-19: avatar upload, advanced-mode save, etc.).
      SHEPARD_CORS_ORIGINS: "https://shepard.nuclide.systems,http://localhost:3000,http://127.0.0.1:3000"
      # AES-256-GCM key for encrypting stored git credential PATs.
      # Required for PATCH /v2/me/git-credentials and the admin preseed
      # endpoint to function. Generate a new key: openssl rand -base64 32
      SHEPARD_SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      # Plugin opt-in — all plugins default to disabled in application.properties.
      # Operators must explicitly enable each plugin here (deploy-time) or via
      # PATCH /v2/admin/plugins/{id}/enabled (runtime). Only plugins wired up on
      # this instance are listed; add / remove to control the active surface.
      SHEPARD_PLUGINS_KIP_ENABLED: "true"
      SHEPARD_PLUGINS_MINTER_LOCAL_ENABLED: "true"
      SHEPARD_PLUGINS_SPATIAL_ENABLED: "true"
      SHEPARD_PLUGINS_GIT_ENABLED: "true"
      SHEPARD_PLUGINS_AAS_ENABLED: "true"
      # VID1b — enables the video capability declaration so shepard-plugin-imagebundle
      # dependency resolution succeeds. The VideoStreamReference endpoints are in-tree;
      # this toggle also enables the /v2/admin/plugins "video" row in the admin UI.
      SHEPARD_PLUGINS_VIDEO_ENABLED: "true"
      # PgBouncer — route main JDBC datasource through the pooler.
      # prepareThreshold=0 disables server-side prepared statements, which
      # are incompatible with PgBouncer transaction-pooling mode (the driver
      # would try to bind a prepared statement on a different backend connection
      # than it was prepared on). Agroal's client-side statement cache is
      # unaffected and continues to work.
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://pgbouncer:5432/${POSTGRES_DB}?prepareThreshold=0"
    depends_on:
      pgbouncer:
        condition: service_healthy
    volumes:
      - bootstrap-token:/opt/shepard-bootstrap
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/shepard/api/healthz/ready"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  # PgBouncer — connection pooler in transaction mode for TimescaleDB.
  # Sits between the backend and timescaledb; reduces Postgres backend process
  # count under high-frequency timeseries ingestion and parallel API requests.
  # Transaction pooling: each backend thread holds a Postgres connection only
  # for the duration of a single transaction, then releases it to the pool.
  # Pool sizing: 20 server connections handles ~200 concurrent backend threads
  # on a typical research workload; raise DEFAULT_POOL_SIZE on heavier instances.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_USER: ${POSTGRES_SHEPARD_USER}
      DB_PASSWORD: ${POSTGRES_SHEPARD_USER_PW}
      DB_HOST: timescaledb
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      # Postgres 16 (TimescaleDB 2.24.0-pg16) uses scram-sha-256 by default.
      AUTH_TYPE: scram-sha-256
      # auth_query via a SECURITY DEFINER function so PgBouncer can look up
      # password hashes without needing superuser access to pg_authid/pg_shadow.
      # The pgbouncer.get_auth function is created in 00-init-postgres-db.sh
      # and owned by postgres with EXECUTE granted to the shepard user.
      AUTH_USER: ${POSTGRES_SHEPARD_USER}
      AUTH_QUERY: "SELECT username, password FROM pgbouncer.get_auth($1)"
      # Release idle server connections after 10 minutes — prevents stale
      # connections accumulating when ingestion is bursty.
      SERVER_IDLE_TIMEOUT: "600"
    depends_on:
      - timescaledb
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - shepard
    restart: unless-stopped

  frontend:
    image: ${SHEPARD_FRONTEND_IMAGE:-shepard-frontend:local}
    environment:
      # Public Keycloak URL — must be reachable from the user's browser.
      NUXT_OIDC_ISSUER: "https://shepard-auth.nuclide.systems/realms/shepard-demo/"
      NUXT_OIDC_CLIENT_ID: "frontend-dev"

  # Keycloak — imports the pre-seeded demo realm on first start.
  # Realm: shepard-demo / Client: frontend-dev (public)
  # Test users: alice/alice-demo, bob/bob-demo, admin/admin-demo, harvester/harvester-demo
  # Data is persisted in a named volume so the RSA signing key survives restarts.
  # If you need to re-import a changed realm JSON, run:
  #   docker compose stop keycloak && docker volume rm infrastructure_keycloak-data && docker compose up -d keycloak
  keycloak:
    image: keycloak/keycloak:latest
    command:
      - "start-dev"
      - "--import-realm"
      - "--http-port=8082"
    ports:
      - "8082:8082"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      KC_HTTP_PORT: "8082"
      # Forces Keycloak to always use this URL as the issuer in tokens
      # (Keycloak 26 v2 hostname option — replaces deprecated KC_HOSTNAME_URL).
      # Must match OIDC_AUTHORITY in the backend so `iss` claim validation passes.
      KC_HOSTNAME: "https://shepard-auth.nuclide.systems"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/shepard-demo-realm.json:/opt/keycloak/data/import/shepard-demo-realm.json:ro
      - keycloak-data:/opt/keycloak/data
    networks:
      shepard:
        # DNS alias so backend/seeder can resolve shepard-auth.nuclide.systems
        # to this container without going through the public internet.
        aliases:
          - shepard-auth.nuclide.systems
    restart: unless-stopped

  # Caddy proxies frontend:3000 on HTTP port 80.
  # TLS is terminated upstream by Zoraxy.
  # No SSL certs needed; Caddyfile uses auto_https off.

  # ── home-showcase (HOME1) — MQTT collector for live HA telemetry ──
  #
  # Two services, both gated behind the `home-showcase` compose profile so
  # the default `docker compose up` doesn't spin them up.
  #
  # home-showcase-seeder: one-shot provisioning. Creates the Collection +
  #   3 TimeseriesContainers + DataObjects + References. Idempotent.
  # home-showcase-collector: long-lived MQTT subscriber. Streams zigbee2mqtt
  #   readings into the seeded containers.
  #
  # Bring up: docker compose --profile home-showcase up -d
  home-showcase-seeder:
    # No profile gate — every deploy seeds the home Collection metadata so
    # the page exists for visitors even when the live MQTT collector is
    # off. The collector itself stays profile-gated below (it needs MQTT
    # creds the seeder doesn't).
    image: python:3.12-slim
    environment:
      # API key minted internally via entrypoint.sh against Keycloak admin —
      # no SHEPARD_API_KEY needs to be set by the deployer.
      BACKEND_URL: "http://backend:8080/shepard/api"
      KC_URL: "http://keycloak:8082"
      KC_REALM: "shepard-demo"
      KC_CLIENT_ID: "frontend-dev"
      KC_ADMIN_USER: "admin"
      KC_ADMIN_PASS: "admin-demo"
      HOME_SHOWCASE_MODE: "seeder"
    volumes:
      - ../examples/home-showcase:/home-showcase:ro
      - home-showcase-state:/opt/home-showcase
      - seeder-logs:/var/log/shepard-seed
    depends_on:
      backend:
        condition: service_healthy
    # The tee captures every byte of seeder stdout/stderr to a timestamped
    # file under /var/log/shepard-seed so the audit trail of "did the
    # demo seed yesterday" survives a container recycle (compose's
    # docker logs only persists until the next force-recreate).
    command: bash -o pipefail -c "apt-get update -qq && apt-get install -y -qq curl && mkdir -p /var/log/shepard-seed && bash /home-showcase/entrypoint.sh 2>&1 | tee -a /var/log/shepard-seed/home-showcase-$(date +%Y%m%dT%H%M%SZ).log"
    networks:
      - shepard
    restart: "no"

  home-showcase-collector:
    # No profile gate — every deploy starts the collector. If MQTT_HOST is
    # unset the entrypoint exits clean (0) with a one-line log so the
    # container doesn't crashloop for operators without MQTT.
    image: python:3.12-slim
    environment:
      # MQTT broker creds still come from the deployer's env (LAN-only).
      # Empty defaults to keep unrelated compose invocations from erroring.
      MQTT_HOST: "${MQTT_HOST-}"
      MQTT_PORT: "${MQTT_PORT:-1883}"
      MQTT_USER: "${MQTT_USER-}"
      MQTT_PASSWORD: "${MQTT_PASSWORD-}"
      MQTT_TLS: "${MQTT_TLS:-0}"
      MQTT_TLS_VERIFY: "${MQTT_TLS_VERIFY:-0}"
      # Shepard auth — minted in entrypoint.sh.
      BACKEND_URL: "http://backend:8080/shepard/api"
      KC_URL: "http://keycloak:8082"
      KC_REALM: "shepard-demo"
      KC_CLIENT_ID: "frontend-dev"
      KC_ADMIN_USER: "admin"
      KC_ADMIN_PASS: "admin-demo"
      HOME_SHOWCASE_MODE: "collector"
      BATCH_INTERVAL_SEC: "${BATCH_INTERVAL_SEC:-30}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      HOME_SHOWCASE_LOOKUP_PATH: "/opt/home-showcase/seeded.json"
    volumes:
      - ../examples/home-showcase:/home-showcase:ro
      - home-showcase-state:/opt/home-showcase:ro
    depends_on:
      home-showcase-seeder:
        condition: service_completed_successfully
    command: bash -c "apt-get update -qq && apt-get install -y -qq curl && bash /home-showcase/entrypoint.sh"
    networks:
      - shepard
    restart: unless-stopped

  # One-shot demo seeder — runs once after backend is healthy, then exits.
  # Installs numpy + shepard-client, bootstraps admin, and runs seed.py.
  seeder:
    image: python:3.12-slim
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: "http://backend:8080/shepard/api"
      KC_URL: "http://keycloak:8082"
      KC_REALM: "shepard-demo"
      KC_CLIENT_ID: "frontend-dev"
      KC_ADMIN_USER: "admin"
      KC_ADMIN_PASS: "admin-demo"
      BOOTSTRAP_TOKEN_PATH: "/opt/shepard-bootstrap/.bootstrap-token"
      GITHUB_PAT: ${GITHUB_PAT:-}
    volumes:
      - bootstrap-token:/opt/shepard-bootstrap:ro
      - ../examples/lumen-showcase:/seed
      - seeder-logs:/var/log/shepard-seed
    # See home-showcase-seeder above for the tee-to-file rationale.
    # set -o pipefail so the entrypoint's exit code survives the tee — otherwise
    # tee always exits 0 and we'd lose seed-failure signals at the container
    # exit code level. With pipefail, container exit code reflects the seed.
    command: bash -o pipefail -c "apt-get update -qq && apt-get install -y -qq curl && mkdir -p /var/log/shepard-seed && /seed/entrypoint.sh 2>&1 | tee -a /var/log/shepard-seed/lumen-showcase-$(date +%Y%m%dT%H%M%SZ).log"
    networks:
      - shepard
    restart: "no"

  # ── MCP server ────────────────────────────────────────────────────────
  #
  # Sunset 2026-05-21: the Python FastMCP sidecar (shepard-plugin-mcp,
  # container shepard-mcp on :8811) has been retired. Native Quarkus
  # MCP lives in the backend itself at /v2/mcp/sse + /v2/mcp — see
  # McpAuthFilter + CollectionMcpTools / TimeseriesMcpTools /
  # ContentMcpTools. No sidecar container, no separate compose service.
  # The legacy /mcp/* Caddy route has been removed as part of the same
  # sunset.


  # ── Garage S3 sidecar (FS1d activation, task #122) ─────────────────────
  # Plugin-declared sidecar shape lands in task #143 follow-up; for now
  # this is the manual compose path per docs/ops/garage-activation-runbook.md.
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: shepard-garage
    restart: unless-stopped
    networks:
      - shepard
    ports:
      # Loopback only — guardrail. Backend reaches Garage via docker network.
      - "127.0.0.1:3900:3900"   # S3 API
      - "127.0.0.1:3902:3902"   # web (static-bucket serving)
      - "127.0.0.1:3903:3903"   # admin / /health / /metrics
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
      - ./garage.toml:/etc/garage.toml:ro
    healthcheck:
      # Garage v1.0+ serves /health on the ADMIN port (3903), NOT the S3 API port.
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3903/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
volumes:
  keycloak-data:
  bootstrap-token:
  home-showcase-state:
  # seeder-logs persists timestamped per-run logs of both demo seeders
  # so an operator can answer "did yesterday's seed land?" without
  # depending on docker logs (which clears on container recreate).
  seeder-logs:
  garage_data:
  garage_meta:

