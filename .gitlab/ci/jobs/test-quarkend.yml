test_quarkend:
  image: maven:3-eclipse-temurin-17
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository
  needs: []
  variables:
    OIDC_PUBLIC: 
    OIDC_AUTHORITY: https://example.com/
  before_script:
    - !reference [.version_number, script]
    - cd quarkend
  script:
    - mvn ${MAVEN_CLI_OPTS} -Drevision=${VERSION_NUMBER_DEV} verify -DskipITs
    - cat target/site/jacoco/index.html | grep -oP 'Total.*?([0-9]{1,3})%'
    - ls -hal target
  coverage: "/Total.*?([0-9]{1,3})%/"
  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - quarkend/target/jacoco.exec
      - quarkend/target/surefire-reports/*
      - quarkend/target/site/jacoco/*
    reports:
      junit:
        - quarkend/target/surefire-reports/*.xml
