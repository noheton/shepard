diff_backend_client:
  stage: test
  image: alpine:3.23
  needs: [build_backend]
  script:
    # Remove expected differences between api specs
    - "sed -i '/    \"title\" :.*/c\    \"title\" : \"placeholder\",' backend-client/.openapi-source/openapi.json"
    - "sed -i '/    \"title\" :.*/c\    \"title\" : \"placeholder\",' backend/target/openapi/openapi.json"
    - "sed -i '/    \"version\" :.*/c\    \"version\" : \"1.0.0-SNAPSHOT\"' backend-client/.openapi-source/openapi.json"
    - "sed -i '/    \"version\" :.*/c\    \"version\" : \"1.0.0-SNAPSHOT\"' backend/target/openapi/openapi.json"
    # Check if configured generator version matches the generated client
    - cat openapitools.json | grep "version" | cut -d \" -f4 > backend-client/.openapi-source/configured_version
    - if (diff backend-client/.openapi-source/configured_version backend-client/.openapi-generator/VERSION); then
      echo "The specified generator version matches the generated client";
      else
      echo "The specified generator version is out of sync with the generated client. Regenerate to fix this issue.";
      exit 1;
      fi
    # Run diff and inform user if action is necessary
    - if (diff backend-client/.openapi-source/openapi.json backend/target/openapi/openapi.json); then
      echo "The generated client in the nuxtend is up to date.";
      else
      echo "The generated client in the nuxtend is out of sync. Regenerate to fix this issue.";
      echo "See here for more information https://shepard-dlr-shepard-e573f5a4116ef73f64fe76039b5c0aad01da3a88afa.gitlab.io/architecture-docs/#_regenerating_the_client"
      exit 1;
      fi
