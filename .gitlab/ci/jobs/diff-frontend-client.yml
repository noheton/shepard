diff_frontend_client:
  stage: test
  image: alpine:3.20
  needs: [build_backend]
  script:
    # Remove expected differences between api specs
    - "sed -i '/    \"title\" :.*/c\    \"title\" : \"placeholder\",' frontend/src/generated/openapi-source/openapi.json"
    - "sed -i '/    \"title\" :.*/c\    \"title\" : \"placeholder\",' backend/target/openapi/openapi.json"
    - "sed -i '/    \"version\" :.*/c\    \"version\" : \"1.0.0-SNAPSHOT\"' frontend/src/generated/openapi-source/openapi.json"
    - "sed -i '/    \"version\" :.*/c\    \"version\" : \"1.0.0-SNAPSHOT\"' backend/target/openapi/openapi.json"
    # Check if configured generator version matches the generated client
    - cat frontend/openapitools.json | grep "version" | cut -d \" -f4 > frontend/src/generated/openapi-source/configured_version
    - if (diff frontend/src/generated/openapi-source/configured_version frontend/src/generated/openapi/.openapi-generator/VERSION); then
      echo "The specified generator version matches the generated client";
      else
      echo "The specified generator version is out of sync with the generated client. Regenerate to fix this issue.";
      exit 1;
      fi
    # Run diff and inform user if action is necessary
    - if (diff frontend/src/generated/openapi-source/openapi.json backend/target/openapi/openapi.json); then
      echo "The generated client in the frontend is up to date.";
      else
      echo "The generated client in the frontend is out of sync. Regenerate to fix this issue.";
      exit 1;
      fi
  allow_failure: true
