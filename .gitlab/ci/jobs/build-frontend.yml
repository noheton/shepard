#TODO: Remove this file when the old frontend is deleted
.prepare_npm:
  image: node:20-slim
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend/
    - echo //gitlab.com/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN} >> .npmrc
    - npm ci --cache .npm --prefer-offline

lint_frontend:
  extends: .prepare_npm
  stage: test
  needs: []
  script:
    - npm run lint

build_frontend:
  extends: .prepare_npm
  stage: build
  needs: [get_version]
  script:
    - npm version --no-git-tag-version --allow-same-version ${VERSION_NUMBER}
    - npm run type-check
    - npm run build-only
  artifacts:
    paths:
      - frontend/dist/
