cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/

.prepare_npm: &prepare_npm
  - cp .npmrc frontend/
  - cd frontend
  - NPM_PACKAGE_NAME=$(node -p "require('./package.json').name")
  - NPM_PACKAGE_VERSION=$(node -p "require('./package.json').version")
  - echo //gitlab.com/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN} >> .npmrc
  - npm ci --cache .npm --prefer-offline

lint_frontend:
  stage: test
  image: node:21-slim
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  needs: []
  before_script:
    - *prepare_npm
  script:
    - npm run lint

build_frontend:
  image: node:21-slim
  stage: build
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - !reference [.version_number, script]
    - *prepare_npm
  script:
    - npm version --no-git-tag-version ${VERSION_NUMBER}
    - npm run type-check
    - npm run build-only
  artifacts:
    paths:
      - frontend/dist/
