.prepare_npm:
  image: node:21
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  needs: [get_version]
  before_script:
    - echo //gitlab.com/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN} >> .npmrc
    - npm ci --cache .npm --prefer-offline --workspace=frontend

lint_frontend:
  extends: .prepare_npm
  stage: test
  needs: []
  script:
    - npm run lint --workspace=frontend

build_frontend:
  extends: .prepare_npm
  stage: build
  needs: [get_version]
  script:
    - cd frontend
    - npm version --no-git-tag-version ${VERSION_NUMBER}
    - npm run type-check
    - npm run build-only
  artifacts:
    paths:
      - frontend/dist/
