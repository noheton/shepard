.prepare_frontend:
  image: node:22-slim
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - echo //gitlab.com/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN} >> .npmrc
    - npm ci --cache .npm --prefer-offline --workspace=frontend

lint_frontend:
  extends: .prepare_frontend
  stage: test
  needs: []
  script:
    - npm run lint --workspace=frontend

build_frontend:
  extends: .prepare_frontend
  stage: build
  needs: [get_version]
  script:
    - cd frontend
    - npm version --no-git-tag-version --allow-same-version ${VERSION_NUMBER}
    - npm run typecheck
    - npm run build
  artifacts:
    paths:
      - frontend/.output/
