test-backend:
  image: maven:3-eclipse-temurin-17
  stage: test
  needs: []
  before_script:
    - !reference [.version_number, script]
    - cd backend
  script:
    - mvn ${MAVEN_CLI_OPTS} -Drevision=${VERSION_NUMBER_DEV} -DskipITs verify -P test
    - cat target/site/jacoco/index.html | grep -oP 'Total.*?([0-9]{1,3})%'
    - ls -hal target
  coverage: "/Total.*?([0-9]{1,3})%/"
  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - backend/target/jacoco.exec
      - backend/target/surefire-reports/*
      - backend/target/site/jacoco/*
    reports:
      junit:
        - backend/target/surefire-reports/*.xml
