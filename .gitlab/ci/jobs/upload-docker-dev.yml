spec:
  inputs:
    image_name:
      options: ["backend", "frontend"]
---
"upload-docker-dev-$[[ inputs.image_name ]]":
  image: docker:27.1
  stage: upload
  services:
    - name: docker:dind
  needs:
    - "build_$[[ inputs.image_name ]]"
  before_script:
    - export DOCKER_IMAGE_NAME=${CI_REGISTRY}/${CI_PROJECT_ROOT_NAMESPACE}/$[[ inputs.image_name ]]
    - echo building docker image $DOCKER_IMAGE_NAME
  script:
    - cd $[[ inputs.image_name ]]
    - echo "${CI_DEPLOY_PASSWORD}" | docker login ${CI_REGISTRY} -u ${CI_DEPLOY_USER} --password-stdin
    - docker build -t $DOCKER_IMAGE_NAME:dev .
    - docker push $DOCKER_IMAGE_NAME:dev
