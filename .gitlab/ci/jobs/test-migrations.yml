test_migrations:
  image: maven:3-eclipse-temurin-21
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository
  needs: [get_version]
  variables:
    OIDC_PUBLIC: 
    OIDC_AUTHORITY: https://example.com/

    QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://timescaledb:5432/postgres
    QUARKUS_DATASOURCE_USERNAME: shepard
    QUARKUS_DATASOURCE_PASSWORD: shepard_secret

    QUARKUS_DATASOURCE_SPATIAL_JDBC_URL: jdbc:postgresql://postgis:5432/postgres
    QUARKUS_DATASOURCE_SPATIAL_USERNAME: shepard
    QUARKUS_DATASOURCE_SPATIAL_PASSWORD: shepard_secret

    QUARKUS_MONGODB_CONNECTION_STRING: mongodb://mongo:shepard@mongodb:27017

    NEO4J_HOST: neo4j:7687
    NEO4J_USERNAME: neo4j
    NEO4J_PASSWORD: shepardshepard

    POSTGRES_DB: postgres
    POSTGRES_USER: shepard
    POSTGRES_PASSWORD: shepard_secret

  services:
    - name: neo4j:5.24
      alias: neo4j
      variables:
        NEO4J_AUTH: neo4j/shepardshepard
        # This is needed so that the NEO4J container service does not fail due to unknown config parameters like NEO4J_HOST.
        # See this link: https://neo4j.com/docs/operations-manual/4.4/docker/configuration/#docker-environment-variables
        NEO4J_server_config_strict__validation_enabled: false
      entrypoint:
        # This is a fix for the bug described in: https://gitlab.com/dlr-shepard/shepard/-/issues/266
        # GitLabs CI_SERVER_TLS_CA_FILE is interpreted as a docker secrets file by Neo4j,
        # but the file does not exist and the service fails to start.
        - /bin/bash
        - -c
        - |
          unset CI_SERVER_TLS_CA_FILE
          exec tini -g -- /startup/docker-entrypoint.sh neo4j
    - name: mongo:8.0
      alias: mongodb
      variables:
        MONGO_INITDB_ROOT_USERNAME: mongo
        MONGO_INITDB_ROOT_PASSWORD: shepard
        MONGO_INITDB_DATABASE: test
    - name: timescale/timescaledb:2.18.1-pg16
      alias: timescaledb
    - name: postgis/postgis:16-3.5
      alias: postgis
  before_script:
    - cd backend
  script:
    - mvn ${MAVEN_CLI_OPTS} -Drevision=${VERSION_NUMBER} verify -Pmigration-test
    - cat target/site/jacoco/index.html | grep -oP 'Total.*?([0-9]{1,3})%'
    - ls -hal target
  coverage: "/Total.*?([0-9]{1,3})%/"
  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - backend/target/jacoco.exec
      - backend/target/surefire-reports/*
      - backend/target/site/jacoco/*
    reports:
      junit:
        - backend/target/surefire-reports/*.xml
