compare_typescript_client:
  image: node:21-slim
  cache:
    key:
      files:
        - clients/tests/typescript/package-lock.json
    paths:
      - .npm/
  stage: build
  needs: [build_typescript_client]
  script:
    - cd clients/tests/typescript
    - npm ci --cache .npm --prefer-offline
    - npm run compare-exports
  allow_failure: true
