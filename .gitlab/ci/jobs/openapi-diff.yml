spec:
  inputs:
    target_branch:
      options: ["develop", "main"]
---
openapi-diff:
  stage: test
  image:
    name: openapitools/openapi-diff:2.1.7
    entrypoint: [""]
  needs: [build_backend, get_version]
  script:
    - if [ "$[[inputs.target_branch]]" == "develop" ]; then export SPEC_LOCATION=develop; else export SPEC_LOCATION="$LATEST_TAG"-release; fi
    - java -jar /app/openapi-diff.jar https://gitlab.com/dlr-shepard/shepard/-/jobs/artifacts/$SPEC_LOCATION/raw/backend/target/openapi/openapi.yaml?job=build_backend backend/target/openapi/openapi.yaml --fail-on-changed --text backend/target/openapi/diff.txt --markdown backend/target/openapi/diff.md
  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - backend/target/openapi/*
  allow_failure: true
