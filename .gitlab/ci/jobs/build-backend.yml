build_backend:
  image: maven:3-eclipse-temurin-17
  stage: build
  needs: [get_version]
  before_script:
    - echo building Quarkus Backend jar
  script:
    - cd backend
    - mvn ${MAVEN_CLI_OPTS} -B org.apache.maven.plugins:maven-dependency-plugin:3.1.2:go-offline
    - mvn ${MAVEN_CLI_OPTS} package -P prod -Drevision=${VERSION_NUMBER}

  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - backend/target/
