build-quarkend:
  image:
    name: quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-17
    entrypoint:
      - ""
  stage: build
  needs: []
  before_script:
    - !reference [.version_number, script]
    - echo building Quarkus native executable
  script:
    - cd quarkend
    - ./mvnw package -Dnative -Drevision=${VERSION_NUMBER_DEV}
  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - quarkend/target/*-runner
