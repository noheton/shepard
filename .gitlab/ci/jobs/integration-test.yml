integration_test:
  image: maven:3-eclipse-temurin-17
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository
  needs: [build_backend, get_version]
  variables:
    OIDC_PUBLIC: 
    OIDC_AUTHORITY: https://example.com/
    INFLUX_HOST: influxdb:8086
    INFLUX_USERNAME: influx
    INFLUX_PASSWORD: shepard
    NEO4J_HOST: neo4j:7687
    NEO4J_USERNAME: neo4j
    NEO4J_PASSWORD: shepard
    QUARKUS_MONGODB_CONNECTION_STRING: mongodb://mongo:shepard@mongodb:27017
    CI_DEBUG_TRACE: "true"

    # Variables for Database Services
    NEO4J_AUTH: neo4j/shepard
    MONGO_INITDB_ROOT_USERNAME: mongo
    MONGO_INITDB_ROOT_PASSWORD: shepard
    MONGO_INITDB_DATABASE: test
    INFLUXDB_ADMIN_USER: influx
    INFLUXDB_ADMIN_PASSWORD: shepard
  services:
    - name: neo4j:5.24
      alias: neo4j
    - name: mongo:8.0
      alias: mongodb
    - name: influxdb:1.8
      alias: influxdb
  before_script:
    - cd backend
  script:
    - env
    - mvn ${MAVEN_CLI_OPTS} -Drevision=${VERSION_NUMBER} failsafe:integration-test failsafe:verify -P integration
  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - backend/target/failsafe-reports/*
    reports:
      junit:
        - backend/target/failsafe-reports/*.xml
