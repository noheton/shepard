integration-test:
  image: maven:3-eclipse-temurin-17
  stage: test
  needs: []
  variables:
    NEO4J_AUTH: neo4j/shepard
    MONGO_INITDB_ROOT_USERNAME: mongo
    MONGO_INITDB_ROOT_PASSWORD: shepard
    MONGO_INITDB_DATABASE: test
    INFLUXDB_ADMIN_USER: influx
    INFLUXDB_ADMIN_PASSWORD: shepard
  services:
    - name: neo4j:4.4
      alias: neo4j
    - name: mongo:4.4
      alias: mongodb
    - name: influxdb:1.8
      alias: influxdb
  before_script:
    - !reference [.version_number, script]
    - cd backend
  script:
    - mvn ${MAVEN_CLI_OPTS} -Drevision=${VERSION_NUMBER_DEV} -DskipUTs verify -P test
    - ls -hal target
  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - backend/target/tomcat10x-logs/*
      - backend/target/failsafe-reports/*
    reports:
      junit:
        - backend/target/failsafe-reports/*.xml
