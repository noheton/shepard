build_maven_report:
  image: maven:3-eclipse-temurin-17
  stage: test
  needs: [test_backend, get_version]
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository
  before_script:
    - cd backend
  script:
    - ls -hal target
    - mvn ${MAVEN_CLI_OPTS} -Drevision=${VERSION_NUMBER_DEV} site -P test
    - ls -hal target/site
  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - backend/target/site/*
