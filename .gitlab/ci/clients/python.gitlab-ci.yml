.build_python: &build_python
  stage: build
  image:
    name: openapitools/openapi-generator-cli:v7.12.0
    entrypoint: [""]
  # CG1b — input is the v1-shelf doc (post-slice, post-unrequire) per
  # ADR-0022 / aidocs/57 §4.2. The /v2/ shelf has its own Kiota-generated
  # Python client under clients-v2/python/ (CG1a).
  needs: [slice_openapi_v1, get_version, unrequire_attributes_for_python]
  script:
    - docker-entrypoint.sh generate -i backend/target/openapi/openapi_v1_no_required.json -g python -o clients/python -p=packageName=shepard_client,packageVersion=${VERSION_NUMBER}
    # Regression fence: assert the generated client contains no /v2/ references.
    - bash clients/tests/v1-scope-smoke-test.sh python
  artifacts:
    expire_in: 2 days
    paths:
      - clients/python

.upload_python_client: &upload_python
  stage: upload
  image: python:3.13-slim
  needs: [build_python_client]
  before_script:
    - python3 -m pip install wheel setuptools twine
  script:
    - cd clients/python
    - python3 setup.py sdist bdist_wheel
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi --disable-progress-bar dist/*

.build_python_client:
  <<: *build_python
  before_script:
    # overwrite version number format if it is a dev job, to match python naming conventions
    - if [ $IS_DEV_JOB -eq 1 ]; then
      export VERSION_NUMBER=${LATEST_TAG}.dev${CI_PIPELINE_IID};
      fi
    - echo ${VERSION_NUMBER}
