.build_java: &build_java
  stage: build
  image:
    name: openapitools/openapi-generator-cli:v7.16.0
    entrypoint: [""]
  # CG1b — input is the v1-shelf doc (per ADR-0022 / aidocs/57 §4.2), so
  # the Java client covers /shepard/api/... only. The /v2/ shelf has its
  # own Kiota-generated client under clients-v2/ (CG1a).
  needs: [slice_openapi_v1, get_version]
  script:
    - docker-entrypoint.sh generate -i backend/target/openapi/openapi_v1.json -g java -o clients/java/client -c clients/java/config.yaml -p=artifactVersion=${VERSION_NUMBER}
    # Regression fence: assert the generated client contains no /v2/ references.
    - bash clients/tests/v1-scope-smoke-test.sh java
  artifacts:
    expire_in: 2 days
    paths:
      - clients/java

.upload_java_client:
  stage: upload
  image: maven:3-eclipse-temurin-21
  needs: [build_java_client]
  script:
    - cd clients/java
    - mvn ${MAVEN_CLI_OPTS} deploy -s ci_settings.xml

.build_java_client:
  <<: *build_java
  before_script:
    # add a '-SNAPSHOT' to dev builds
    - if [ $IS_DEV_JOB -eq 1 ]; then
      export VERSION_NUMBER=${VERSION_NUMBER}-SNAPSHOT;
      fi
    - echo ${VERSION_NUMBER}
