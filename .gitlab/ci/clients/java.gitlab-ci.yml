.build_java: &build_java
  stage: build
  image:
    name: openapitools/openapi-generator-cli:v7.6.0
    entrypoint: [""]
  needs:
    - job: build-backend
      artifacts: true
  script:
    - docker-entrypoint.sh generate -i backend/target/openapi/openapi.json -g java -o clients/java/client -p=apiPackage=de.dlr.shepard.client.java.api,modelPackage=de.dlr.shepard.client.java.model,artifactId=shepard-client,groupId=de.dlr.shepard.client.java,parentGroupId=de.dlr.shepard.client.java,parentArtifactId=de.dlr.shepard.client.java,parentVersion=1.0.0-SNAPSHOT,artifactVersion=${VERSION_NUMBER}
  artifacts:
    expire_in: 2 days
    paths:
      - clients/java

.upload_java: &upload_java
  stage: upload
  script:
    - cd clients/java
    - mvn ${MAVEN_CLI_OPTS} deploy -s ci_settings.xml

build_javaclient_dev:
  <<: *build_java
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
  before_script:
    - !reference [.version_number, script]
    - export VERSION_NUMBER=${VERSION_NUMBER}-dev-${CI_PIPELINE_IID}-SNAPSHOT
    - echo ${VERSION_NUMBER}

upload_javaclient_dev:
  <<: *upload_java
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
  needs:
    - job: build_javaclient_dev
      artifacts: true

build_javaclient:
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^.*-release$/
  <<: *build_java
  before_script:
    - !reference [.version_number, script]
    - echo ${VERSION_NUMBER}

upload_javaclient:
  <<: *upload_java
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^.*-release$/
  needs:
    - job: build_javaclient
      artifacts: true

