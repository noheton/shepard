.build_python: &build_python
  stage: build_clients
  image:
    name: openapitools/openapi-generator-cli:v7.6.0
    entrypoint: [""]
  needs: [build]
  dependencies: [build]
  script:
    - docker-entrypoint.sh generate -i target/openapi/openapi.json -g python -o clients/python -p=packageName=shepard_client,packageVersion=${VERSION_NUMBER}
  artifacts:
    expire_in: 2 days
    paths:
      - clients/python

.upload_python: &upload_python
  stage: upload
  image: python:3.12-slim
  before_script:
    - python3 -m pip install wheel setuptools twine
  script:
    - cd clients/python
    - python3 setup.py sdist bdist_wheel
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi --disable-progress-bar dist/*

build_pythonclient_dev:
  <<: *build_python
  extends: .only_branches
  before_script:
    - !reference [.version_number, script]
    - export VERSION_NUMBER=${VERSION_NUMBER}.dev${CI_PIPELINE_IID}
    - echo ${VERSION_NUMBER}

upload_pythonclient_dev:
  <<: *upload_python
  extends: .only_main
  needs: [build_pythonclient_dev]
  dependencies: [build_pythonclient_dev]

build_pythonclient:
  <<: *build_python
  extends: .only_releases
  before_script:
    - !reference [.version_number, script]
    - echo ${VERSION_NUMBER}

upload_pythonclient:
  <<: *upload_python
  extends: .only_releases
  needs: [build_pythonclient]
  dependencies: [build_pythonclient]
