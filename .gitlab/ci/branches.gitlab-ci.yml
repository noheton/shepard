test_test:
  image: alpine:3.20
  stage: test
  needs: []
  variables:
    # Variables for Database Services
    NEO4J_AUTH: neo4j/shepard
    MONGO_INITDB_ROOT_USERNAME: mongo
    MONGO_INITDB_ROOT_PASSWORD: shepard
    MONGO_INITDB_DATABASE: test
    INFLUXDB_ADMIN_USER: influx
    INFLUXDB_ADMIN_PASSWORD: shepard
    CI_DEBUG_SERVICES: "true"

  services:
    - name: neo4j:5.24
      alias: neo4j
      entrypoint:
        - bash
        - -c
        - |
          env
          ls -laF bin
          echo "-------------"
          ls -laF import
          echo "-------------"
          ls -laF run
          echo "-------------"
          ls -laF /startup
          echo "-------------"
          "tini", "-g", "--", "/startup/docker-entrypoint.sh"

  script:
    - cat /builds/dlr-shepard/shepard.tmp/CI_SERVER_TLS_CA_FILE
    - env

  artifacts:
    paths:
      - neo4j-docker-entrypoint.sh
    expire_in: 1 hour
