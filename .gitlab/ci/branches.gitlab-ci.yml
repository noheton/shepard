test_test:
  image: alpine:3.20
  stage: test
  needs: []
  variables:
    # Variables for Database Services
    NEO4J_AUTH: neo4j/shepard
    MONGO_INITDB_ROOT_USERNAME: mongo
    MONGO_INITDB_ROOT_PASSWORD: shepard
    MONGO_INITDB_DATABASE: test
    INFLUXDB_ADMIN_USER: influx
    INFLUXDB_ADMIN_PASSWORD: shepard
    GIT_SSL_NO_VERIFY: "true"

  services:
    - name: neo4j:5.24
      alias: neo4j
      command:
        - echo "This is executed"
      entrypoint:
        - /bin/sh -c "stat /builds/dlr-shepard/shepard.tmp/CI_SERVER_TLS_CA_FILE"
    - name: mongo:8.0
      alias: mongodb
    - name: influxdb:1.8
      alias: influxdb
  script:
    - echo "hello"
    - stat /builds/dlr-shepard/shepard.tmp/CI_SERVER_TLS_CA_FILE
    - stat hulli
    - env
