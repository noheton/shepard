{{/*
  Backend Service — Phase 1 STUB.
  TODO Phase 2: ServiceMonitor child, headless variant for stateful caches.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "shepard.fullname" . }}-backend
  labels:
    {{- include "shepard.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "shepard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
