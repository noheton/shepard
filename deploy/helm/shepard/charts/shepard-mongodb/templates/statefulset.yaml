{{/*
  MongoDB StatefulSet — Phase 1 STUB.
  TODO Phase 2: replica set bootstrap, Secret, exporter sidecar.
*/}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-mongodb
  labels:
    app.kubernetes.io/name: shepard-mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: document-substrate
spec:
  serviceName: {{ .Release.Name }}-mongodb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shepard-mongodb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shepard-mongodb
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: mongodb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: mongo
              containerPort: 27017
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
