{{/*
  Garage StatefulSet — Phase 1 STUB.
  TODO Phase 2: cluster-membership bootstrap, bucket bootstrap Job, anti-affinity
  rules for the 3-node HA mode.
*/}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-garage
  labels:
    app.kubernetes.io/name: shepard-garage
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: object-storage
spec:
  serviceName: {{ .Release.Name }}-garage
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shepard-garage
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shepard-garage
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: garage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: s3
              containerPort: 3900
            - name: admin
              containerPort: 3903
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
