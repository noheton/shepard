{{/*
  Keycloak Deployment — Phase 1 STUB.
  TODO Phase 2: realm-import ConfigMap mount, DB sidecar / external DB config, Secret
  for admin creds + client secrets, Service, Ingress sidecar entry (auth subpath
  pattern).
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keycloak
  labels:
    app.kubernetes.io/name: shepard-keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shepard-keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shepard-keycloak
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["start-dev"]  # TODO Phase 2: "start" with proper hostname / DB
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
