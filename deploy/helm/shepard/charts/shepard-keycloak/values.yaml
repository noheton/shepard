# Keycloak sub-chart values — Phase 1 STUB.
image:
  repository: quay.io/keycloak/keycloak
  tag: "25.0.6"
  pullPolicy: IfNotPresent
service:
  port: 8080
adminUser: admin
adminPassword: ""  # if empty, generated + stored in Secret; rotate after first login
realm:
  bootstrap: true
  importConfigMap: ""  # references infrastructure/keycloak/shepard-demo-realm.json
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi
