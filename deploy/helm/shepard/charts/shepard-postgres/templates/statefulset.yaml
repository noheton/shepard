{{/*
  Postgres + TimescaleDB StatefulSet — Phase 1 STUB.
  TODO Phase 2: volumeClaimTemplates, init-container to install pgvector / load
  TimescaleDB extension into the shepard db, Service (5432), Secret for password,
  ServiceMonitor exporter sidecar (postgres_exporter), PodDisruptionBudget.
*/}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app.kubernetes.io/name: shepard-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: timeseries-substrate
spec:
  serviceName: {{ .Release.Name }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shepard-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shepard-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
