variables:
  MAVEN_CLI_OPTS: "--batch-mode"
  MAVEN_OPTS: "-Dmaven.repo.local=${CI_PROJECT_DIR}/.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn"
  DOCKER_IMAGE: "${CI_REGISTRY_IMAGE}:latest"
  BACKEND_IMAGE_NAME: "backend"
  SECRET_DETECTION_EXCLUDED_PATHS: "node_modules"
  DS_EXCLUDED_PATHS: "node_modules"
  FRONTEND_IMAGE_NAME: "frontend"
  GIT_SSL_NO_VERIFY: true

workflow:
  rules:
    # Run Merge Request Pipelines for all merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Skip all remaining branch pipelines for merge requests
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Run branch pipelines when no merge request exists
    - if: $CI_COMMIT_BRANCH
    # Run release tag pipeline on special tags
    - if: $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+-release$/

include:
  # Minimal default pipeline for all non-protected branches
  - local: .gitlab/ci/branches.gitlab-ci.yml
    rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        when: never
      - if: $CI_COMMIT_REF_PROTECTED == "true"
        when: never
      - when: always

  # Merge Request pipeline
  - local: .gitlab/ci/mr.gitlab-ci.yml
    rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"

  # Special pipeline for develop branch
  - local: .gitlab/ci/dev.gitlab-ci.yml
    rules:
      - if: $CI_COMMIT_REF_NAME == "develop"

  # Special pipeline for main branch
  - local: .gitlab/ci/main.gitlab-ci.yml
    rules:
      - if: $CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+-release$/

# This job is a fix for one specific use case:
# When pushing to a protected branch, none of the above jobs is included by the 'include' statements.
# This results in an error for the GitLab CI, because it expects to always have at least one visible job.
# Even if the pipeline workflow is not supposed to start a pipeline, this results in a pipeline error.
#
# This is a fix for the following bug ticket: https://gitlab.com/dlr-shepard/shepard/-/issues/198
dummy_job:
  rules:
    - when: never
  script:
    - echo "I'm a dummy job that is always visible for all pipelines but does nothing."
