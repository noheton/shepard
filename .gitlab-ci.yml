variables:
  MAVEN_CLI_OPTS: "--batch-mode"
  MAVEN_OPTS: "-Dmaven.repo.local=${CI_PROJECT_DIR}/.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn"
  DOCKER_IMAGE: "${CI_REGISTRY_IMAGE}:latest"
  BACKEND_IMAGE_NAME: "backend"
  SECRET_DETECTION_EXCLUDED_PATHS: "node_modules"
  DS_EXCLUDED_PATHS: "node_modules"
  FRONTEND_IMAGE_NAME: "frontend"

.version_number:
  script:
    # Latest release version tag
    - export LATEST_TAG=$(curl -s https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/releases | grep -oP -m 1 '"tag_name":.*?[^\\]",' | head -n 1 | sed 's/.*"tag_name":"\([^"]*\)".*/\1/')
    # version number is the latest tag if there is no pushed tag (for the release)
    - export VERSION_NUMBER=${CI_COMMIT_TAG:-${LATEST_TAG}}
    - export VERSION_NUMBER_DEV=${VERSION_NUMBER}-dev-${CI_PIPELINE_IID}

workflow:
  rules:
    # Skip Merge Request Pipelines on protected branches
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_PROTECTED == "true"
      when: never
    # Run Merge Request Pipelines for all remaining merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Run branch pipelines for develop branch
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_REF_NAME == "develop"
    # Skip all remaining branch pipelines for merge requests
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Run branch pipelines when no merge request exists
    - if: $CI_COMMIT_BRANCH
    # Run Release tag pipeline on main
    - if: $CI_COMMIT_TAG

include:
  # Minimal default pipeline for all non-protected branches
  - local: .gitlab/ci/branches.gitlab-ci.yml
    rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        when: never
      - if: $CI_COMMIT_REF_PROTECTED == "true"
        when: never
      - if: $CI_COMMIT_TAG
        when: never
      - when: always

  # Merge Request pipeline
  - local: .gitlab/ci/mr.gitlab-ci.yml
    rules:
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"

  # Special pipeline for develop branch
  - local: .gitlab/ci/dev.gitlab-ci.yml
    rules:
      - if: $CI_COMMIT_REF_NAME == "develop"

  # Special pipeline for main branch
  - local: .gitlab/ci/main.gitlab-ci.yml
    rules:
      - if: $CI_COMMIT_REF_NAME == "main" && $CI_COMMIT_TAG
