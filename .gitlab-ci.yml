image: python:3

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - venv/

before_script:
  - python -m venv venv
  - source venv/bin/activate
  - pip install -r requirements.txt

black:
  script:
    - python -m black main.py --check

isort:
  script:
    - python -m isort main.py --check

flake8:
  script:
    - python -m flake8 main.py

pylint:
  script:
    - python -m pylint main.py
