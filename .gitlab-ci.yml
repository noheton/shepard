image: maven:3-openjdk-11

variables:
  MAVEN_CLI_OPTS: "--batch-mode"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn"
  REPO: shepard
  IMAGE: backend
  OPENAPI_VERSION: 5.1.0

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .m2/repository/
    - target/

stages:
  - test
  - build
  - build_clients
  - upload
  - deploy

.version_number: &version_number
  - export VERSION_NUMBER=$(git show -s --format=%cd --date=format:'%Y.%m.%d' $CI_COMMIT_SHA)
  - echo $VERSION_NUMBER
  - echo $CI_PROJECT_DIR
  - echo $CI_REGISTRY_IMAGE
  - echo $CI_REGISTRY_USER
  - echo $CI_PAGES_DOMAIN

test:
  stage: test
  before_script:
    - *version_number
  variables:
    NEO4J_AUTH: neo4j/shepard
    MONGO_INITDB_ROOT_USERNAME: mongo
    MONGO_INITDB_ROOT_PASSWORD: shepard
    MONGO_INITDB_DATABASE: test
    INFLUXDB_ADMIN_USER: influx
    INFLUXDB_ADMIN_PASSWORD: shepard
  services:
    - name: neo4j:latest
      alias: neo4j
    - name: mongo:latest
      alias: mongodb
    - name: influxdb:1.8
      alias: influxdb
  script:
    - mvn $MAVEN_CLI_OPTS -Drevision=$VERSION_NUMBER-SNAPSHOT verify site -P test
    - cat target/site/jacoco/index.html | grep -oP 'Total.*?([0-9]{1,3})%'
    - ls -hal target
  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - target/tomcat9x-logs/*
      - target/site/*
    reports:
      junit:
        - target/surefire-reports/*.xml
        - target/failsafe-reports/*.xml

format-prettier:
  stage: test
  image: node:lts-alpine
  before_script:
    - npm install -g prettier
  script:
    - npx prettier --check .

coverage:
  stage: build
  image: haynes/jacoco2cobertura:latest
  needs:
    - test
  dependencies:
    - test
  script:
    # convert report from jacoco to cobertura
    - python /opt/cover2cover.py target/site/jacoco/jacoco.xml src/main/java > target/site/cobertura.xml
    # read the <source></source> tag and prepend the path to every filename attribute
    - python /opt/source2filename.py target/site/cobertura.xml
  artifacts:
    expire_in: 2 days
    reports:
      cobertura: target/site/cobertura.xml

build:
  stage: build
  needs:
    - test
  before_script:
    - *version_number
  script:
    - ls -hal target
    - mvn $MAVEN_CLI_OPTS -Drevision=$VERSION_NUMBER-SNAPSHOT -DskipTests -DskipITs package -P prod
  artifacts:
    when: always
    expire_in: 2 days
    paths:
      - target/*.war
      - target/swagger/*

upload_docker:
  image: docker:git
  stage: upload
  needs:
    - build
  dependencies:
    - build
  services:
    - name: docker:dind
  before_script:
    - *version_number
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker info
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$VERSION_NUMBER -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$VERSION_NUMBER
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - master

pages:
  stage: upload
  needs:
    - test
  dependencies:
    - test
  script:
    - ls -hal target
    - mkdir public
    - mv target/site/* public/
    - echo $CI_PAGES_DOMAIN
  artifacts:
    expire_in: 2 days
    paths:
      - public
  only:
    - master
