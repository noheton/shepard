services:
  neo4j:
    image: neo4j:5.24
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PW}
    networks:
      - shepard
    ports:
      - 7474:7474
      - 7687:7687
    volumes:
      - /opt/shepard/neo4j/logs:/logs
      - /opt/shepard/neo4j/plugins:/plugins
      - /opt/shepard/neo4j/data:/var/lib/neo4j/data
    restart: unless-stopped
    profiles:
      - dev
      - tryout

  mongodb:
    image: mongo:8.0
    networks:
      - shepard
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME-mongo}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD-shepard}
      - MONGO_USERNAME=${MONGO_USERNAME-username}
      - MONGO_PASSWORD=${MONGO_PASSWORD-password}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE-database}
    restart: unless-stopped
    volumes:
      - /opt/shepard/mongodb/db:/data/db
      - /opt/shepard/mongodb/configdb:/data/configdb
      - ../infrastructure/docker-entrypoint-initdb.d/mongodb/00-create-mongo-user.js:/docker-entrypoint-initdb.d/00-create-mongo-user.js
    profiles:
      - dev
      - tryout

  mongoexpress:
    image: mongo-express:latest
    networks:
      - shepard
    ports:
      - 8084:8081
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_INITDB_ROOT_USERNAME-mongo}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD-shepard}
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_INITDB_ROOT_USERNAME-mongo}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_INITDB_ROOT_PASSWORD-shepard}
    restart: unless-stopped
    depends_on:
      - mongodb
    profiles:
      - monitoring

  timescaledb:
    image: timescale/timescaledb:2.18.1-pg16
    networks:
      - shepard
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SHEPARD_USER: ${POSTGRES_SHEPARD_USER}
      POSTGRES_SHEPARD_USER_PW: ${POSTGRES_SHEPARD_USER_PW}
    restart: unless-stopped
    volumes:
      - /opt/shepard/timescaledb:/var/lib/postgres/data
      - ../infrastructure/docker-entrypoint-initdb.d/postgres/00-init-postgres-db.sh:/docker-entrypoint-initdb.d/00-init-postgres-db.sh
    profiles:
      - dev
      - tryout

  postgis:
    image: postgis/postgis:16-3.5
    container_name: postgis
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SHEPARD_USER: ${POSTGRES_SHEPARD_USER}
      POSTGRES_SHEPARD_USER_PW: ${POSTGRES_SHEPARD_USER_PW}
    shm_size: "6GB"
    ports:
      - "5433:5432"
    volumes:
      - ../infrastructure/docker-entrypoint-initdb.d/postgis/00-init-postgis-db.sh:/docker-entrypoint-initdb.d/00-init-postgis-db.sh
    profiles:
      - dev

  keycloak:
    image: keycloak/keycloak:latest
    networks:
      - shepard
    ports:
      - "8082:8082"
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME: "http://localhost:8082"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: 8082
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health/ready"]
      interval: 15s
      timeout: 2s
      retries: 15
    command: "start-dev"
    volumes:
      - keycloak:/opt/keycloak/data
    profiles:
      - dev
      - tryout

  prometheus:
    image: prom/prometheus:latest
    command:
      - --web.enable-remote-write-receiver
      - --enable-feature=native-histograms
      - --config.file=/etc/prometheus/prometheus.yml
    networks:
      - shepard
    ports:
      - "9090:9090"
    volumes:
      - ../infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    networks:
      - shepard
    ports:
      - "3300:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    volumes:
      - grafana:/etc/grafana/provisioning/
    restart: unless-stopped
    profiles:
      - monitoring

  frontend:
    image: registry.gitlab.com/dlr-shepard/shepard/frontend:latest
    depends_on:
      - backend
    environment:
      AUTH_ORIGIN: ${LOCAL_FRONTEND_AUTH_ORIGIN}
      NUXT_PUBLIC_BACKEND_API_URL: ${LOCAL_BACKEND_API_URL}
      NUXT_OIDC_ISSUER: ${OIDC_AUTHORITY}
      NUXT_AUTH_SECRET: "****"
      NUXT_OIDC_CLIENT_ID: "frontend-dev"
    ports:
      - 3000:3000
    restart: unless-stopped
    networks:
      - shepard
    profiles:
      - tryout

  backend:
    image: registry.gitlab.com/dlr-shepard/shepard/backend:latest
    restart: unless-stopped
    environment:
      OIDC_PUBLIC: ${OIDC_PUBLIC}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY}
      NEO4J_HOST: neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PW}
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_SHEPARD_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_SHEPARD_USER_PW}
      SHEPARD_MIGRATION_MODE_ENABLED: ${SHEPARD_MIGRATION_MODE_ENABLED}
      SHEPARD_AUTOCONVERT_INT: ${SHEPARD_AUTOCONVERT_INT}
      SHEPARD_SPATIAL_DATA_ENABLED: "false"
    ports:
      - 8080:8080
    depends_on:
      - neo4j
      - mongodb
      - timescaledb
    networks:
      - shepard
    profiles:
      - tryout

  # FS1i — Garage S3-compatible object-storage sidecar for local development.
  # Off by default; start with: docker compose --profile files-s3 up -d
  #
  # Garage is a lightweight (~10 MB Rust binary, EUPL-1.2 licensed) geo-distributed
  # S3-compatible object store — the ADR-0024 reference for the quick-start stack.
  # Any S3-compatible endpoint works; replace with AWS S3, Cloudflare R2, MinIO, etc.
  # by pointing shepard.files.s3.* at your own endpoint.
  #
  # One-time cluster init after first `docker compose --profile files-s3 up -d`:
  #   NODE=$(docker exec shepard-garage /garage status | grep -oE '[0-9a-f]{16}' | head -1)
  #   docker exec shepard-garage /garage layout assign -z dc1 -c 1G $NODE
  #   docker exec shepard-garage /garage layout apply --version 1
  #   docker exec shepard-garage /garage bucket create shepard
  #   docker exec shepard-garage /garage key create shepard-backend
  #   docker exec shepard-garage /garage bucket allow --read --write shepard --key shepard-backend
  # Then set in application.properties (or export as env vars before `mvn quarkus:dev`):
  #   shepard.files.s3.endpoint=http://localhost:3900
  #   shepard.files.s3.access-key-id=<key printed by `garage key info shepard-backend`>
  #   shepard.files.s3.secret-access-key=<secret printed by `garage key info shepard-backend`>
  #   shepard.files.s3.bucket=shepard
  #   shepard.storage.provider=s3
  #   shepard.plugins.file-s3.enabled=true
  # See docs/reference/file-storage.md for the full operator runbook.
  shepard-garage:
    image: dxflrs/garage:v1.0.1
    container_name: shepard-garage
    command: /garage server
    environment:
      GARAGE_METADATA_DIR: /var/lib/garage/meta
      GARAGE_DATA_DIR: /var/lib/garage/data
      GARAGE_REPLICATION_FACTOR: "1"
      GARAGE_RPC_BIND_ADDR: "0.0.0.0:3901"
      GARAGE_API_S3_BIND_ADDR: "0.0.0.0:3900"
      GARAGE_ADMIN_BIND_ADDR: "0.0.0.0:3903"
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-a8f3d2c1b4e5a6f7d8e9c0b1a2f3d4e5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d}
    ports:
      - "3900:3900"
    volumes:
      - garage-data:/var/lib/garage
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:3903/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - shepard
    restart: unless-stopped
    profiles:
      - files-s3

volumes:
  keycloak:
  grafana:
  garage-data:

networks:
  shepard:
