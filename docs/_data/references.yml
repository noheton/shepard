  title: "Unser Leitbild zu Künstlicher Intelligenz"
  howpublished: "DLR one-pager AI mission statement (undated; uploaded to AI working memory 2026-05-23)"
  note: "DLR's official AI mission statement. Headline claim: ``Wir sind Vorreiter in der Nutzung von und Forschung an KI-basierten Lösungen. Wir setzen KI selbstverständlich und verantwortungsbewusst ein.'' Ten values: Aufgeschlossenheit, Bewusstsein, Menschenorientierung, Kompetenz, Ethik, Rechtssicherheit/Compliance, Effizienz, Souveränität, Transparenz, Alleinstellung. Cited in aidocs/strategy/93-management-context-and-compliance.md \\S 2 + \\S 6.B and aidocs/strategy/89-genai-methodology-and-reflexivity.md (three-way alignment)."
