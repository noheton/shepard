dlrDatenstrategieV60_2026:
  entry_type: "misc"
  author: "Deutsches Zentrum für Luft- und Raumfahrt (DLR)"
  title: "Datenstrategie des DLR"
  year: "2026"
  howpublished: "v60 working draft, dated 2026-05-23. Internal DLR Protokoll-template document with editorial comments still in place. Präambel/Vorwort: Christian. Uploaded to AI working memory 2026-05-23"
  note: "DLR-wide data strategy, v60 working draft. Vision: ``DLR als datengetriebenes Innovationszentrum -- Pionier für zukunftsweisende Forschung und kontinuierlichen Fortschritt.'' Four objectives: (Ziel 1) integrierte Dateninfrastruktur + -plattformen (Datenökosystem); (Ziel 2) interdisziplinäre Forschung + Innovation fördern; (Ziel 3) Entscheidungsprozesse durch unabhängige prädiktive Analysen unterstützen; (Ziel 4) Datenkultur etablieren + Datenkompetenz erhöhen. Maßnahmen include: föderierte Speicherarchitektur (Data Hub); FAIR-Prinzipien verbindlich; kontrollierte Vokabulare/Ontologien; Data-Steward-Netzwerk; Politikberatung. Cross-references DSGVO, SatDSiG, Exportkontrolle, NDA. \\S 5 Empfehlungen-Maßnahmen list and overall accountability/governance pattern still under editorial debate. Primary source for aidocs/strategy/93-management-context-and-compliance.md \\S 1 (fifth institutional layer) and \\S 5 (funding/evaluation cadence). Cite future versions as v$X$ in the same key once finalised."
  category: "dlr_internal"

krebsMfzSteuerung2010:
  entry_type: "unpublished"
  author: "Krebs, Florian"
  title: "Steuerungskonzept der MFZ-Anlage"
  year: "2010"
  month: "oct"
  howpublished: "Internal working deck, DLR Centre for Lightweight Production Technology in Augsburg (ZLP). PowerPoint .ppt (Composite Document File V2), 21 internal revisions between 2010-09-28 and 2010-10-05, 721 words on substantive slides. Cites the EUROP Robotic Visions to 2020 and beyond -- The Strategic Research Agenda for robotics in Europe (2009-07). Filename 9acbb990-20101005_Steuerungskonzept_der_MFZAnlage.ppt ($\\sim$3.1\\,MB). Uploaded to AI working memory 2026-05-23"
  note: "Earliest primary source in the predecessor-systems lineage at DLR ZLP Augsburg. Specifies the automation control concept for the Multifunktionale Fertigungszelle (Multifunctional Production Cell). Read for design intent, it articulates 14 commitments that map directly onto Shepard surfaces a decade-plus later: Konsequente Vermeidung von Einzel-/Insel-L\\\"osungen (avoidance of point/island solutions), Modulare Architektur f\\\"ur schrittweise Weiterentwicklung (modular architecture for incremental evolution), Generische Schnittstelle f\\\"ur Messdatenerfassung (generic measurement-data interface -- the PayloadKind / PayloadStorage SPI ancestor), Automatische Dokumentation von Prozessdaten (automatic process-data documentation -- the W3C-PROV Activity stream ancestor), Detektion von Abweichungen zum Kalibrier-Prozess (deviation detection from calibration baseline -- anomaly-detection ancestor), Zentrale Datenhaltung auf Datenbank (central DB-backed storage), Replay-F\\\"ahigkeit in Simulation zur Analyse und Optimierung (replay capability for analysis and optimisation), Anlagenkonfigurationsmanagement (plant configuration management -- the admin-configurable knobs ancestor, cf. A3b / N1c2 / UH1a), Offene Schnittstellen: AutomationML, XML (open interfaces), Drahtloses virtuelles SmartPAD + Mobile Bedienpanels (wireless shop-floor terminals), Integration des NDT Frameworks ($\\to$ PI-NDT) (NDT as first-class). Primary source for aidocs/strategy/86-shepard-predecessor-systems.md \\S 1.5 (pre-PRAESTO design thinking already articulated in 2010)."
  category: "dlr_internal"

krebsRobotikThemen2010:
  entry_type: "unpublished"
