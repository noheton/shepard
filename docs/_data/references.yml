  note: "Companion slot-deck to krebsMfzSteuerung2010. Sparse substantive content (the deck functions as a section-header placeholder for the research-themes-around-the-MFZ context). Cited for completeness in aidocs/strategy/86-shepard-predecessor-systems.md \\S 1.5 as evidence that the 2010 design-thinking layer extended beyond pure cell-control concerns into the robotics-for-composites research agenda."
