  title: "Übergreifende forschungspolitische Ziele für die Programmorientierte Förderung Periode V (PoF V, 2028--2034)"
  institution: "Bundesministerium für Forschung, Technologie und Raumfahrt (BMFTR)"
  year: "2025"
  month: "sep"
  type: "Ministerial letter to the President of the Helmholtz Association"
  note: "Two-page letter from Dr.~Jochen Zachgo (Leiter Abteilung~4 ``Hochschul- und Wissenschaftssystem; Bildungsfinanzierung'', BMFTR) to Prof.~Dr.~Otmar D. Wiestler (President, Helmholtz-Gemeinschaft Deutscher Forschungszentren e.V., Berlin), dated 24~September~2025 (Bonn), with cc to Dr.~Martin Keller. Transmits the overarching research-policy goals for the fifth period of Programmorientierte Förderung (PoF~V, 2028--2034) to be agreed with the Helmholtz presidium. The three named overarching goals are: (a) a purely declaratory reference to the validity of the PFI (Pakt für Forschung und Innovation) research-policy goals, (b) the development of a joint sustainability strategy, and (c) the development of a joint and overarching architecture concept for the data-management infrastructure (``ein gemeinsames und übergreifendes Architekturkonzept für die Datenmanagement-Infrastruktur''). Goal (c) is the load-bearing strategic context for Shepard's HMC-aligned federation work; see aidocs/strategy/90-hmc-phase-2-positioning.md \\S 1.1. PDF metadata names ``Wolf, Frank /423'' as document author (the BMFTR drafting staffer); signed by Zachgo on the printed letter. Uploaded to AI working memory 2026-05-23."
  category: "policy"

