  note: "DLR-wide software-engineering framework directive. Issue 6 (2025-07-01) introduces ``Forschungssoftware'' as an explicit category with Anwendungsklasse 1 as the floor for research software. Defines four Anwendungsklassen (0--3) plus accountability chain (DLR-Vorstand $\\to$ CIO $\\to$ Software-Engineering-Beauftragter SEB $\\to$ Leitung der Organisationseinheit $\\to$ Software-Engineering-Ansprechperson SEA $\\to$ Verantwortliche Person für die Software). \\S 4.2.4 mandates documentation (Name, Zweck, Verantwortliche Person, Anwendungsklasse, Reifegrad) for AK 2/3 and AK 1 with long-term Weiterentwicklungsperspektive. Mitgeltende Unterlagen include QMH-DLR-VA014 Open Science and QMH-DLR-VA015 Forschungsdatenmanagement. Primary source for aidocs/strategy/93-management-context-and-compliance.md \\S 3 + \\S 6.C audit lens."
