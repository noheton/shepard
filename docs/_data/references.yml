odixMilestone2_2025:
  entry_type: "unpublished"
  author: "Krebs, Florian"
  title: "ODIX -- Milestone Report: ``first prototype finished and evaluated''"
  year: "2025"
  month: "sep"
  howpublished: "Internal milestone report, DLR ODIX project. DOCX. Milestone due date moved from 2025-05-31 to 2025-09-30 in PCR 1 and finalised on 2025-09-30. Filename 3d5b5d38-ODIXMilestone_2_FK.docx ($\\sim$1.8\\,MB). Uploaded to AI working memory 2026-05-23"
  note: "Cross-cutting milestone report covering all four ODIX work-packages (HAPs): HAP 1 -- information extraction from semi-structured technical documents (DW, LLM-based PDF $\\to$ JSON with HITL correction, GUI usable, 2--3\\,min latency per PDF, output to move from JSON to RDF in next deliverable); HAP 2 -- Shepard storage management with metadata schemas + timeseries support (BT, Krebs's group; semantic annotation + interval-metric calculation shipped; component-to-component automation pending); HAP 3 -- exploration UI for the extracted KG (DW; categories: Machines / Procedures / Planned Procedures / Samples; planned-vs-set-vs-measured comparison; CI on GitLab Pages with GitLab-issue feedback loop); HAP 4 -- textual evaluation documentation (SY; per-component evaluation summaries from WF/FM and MO). Two thesis-load-bearing findings: (a) HAP 2's documented gap (``connection of components not yet automated'') is exactly the gap that platform-level SHACL / TPL design closes; (b) HAP 1's pivot from direct PDF $\\to$ RDF to JSON-as-intermediate, with planned move to RDF output, confirms the platform's posture of first-class shapes as the substrate-side answer. Primary source for aidocs/semantics/95-shacl-templates-and-individuals.md \\S 14ee (ODIX Milestone 2 -- what the four work-packages actually shipped)."
  category: "dlr_internal"

hgfFoPoZi5_2025:
  entry_type: "techreport"
  author: "Helmholtz-Gemeinschaft Deutscher Forschungszentren"
  title: "Forschungsbereichsübergreifende forschungspolitische Ziele für die PoF V (2028--2034)"
  institution: "Helmholtz-Gemeinschaft Deutscher Forschungszentren"
  year: "2025"
  month: "sep"
  howpublished: "Cross-association research-policy target document, version V, dated 2025-09-19, addressed to HGF (Helmholtz-Gemeinschaft). DOCX. Filename 7ed80232-_bergreifende_FoPoZi_PoF_V_20250919_1_an_HGF.docx ($\\sim$30\\,KB). Uploaded to AI working memory 2026-05-23"
  note: "Forschungspolitische Ziele (research-policy targets) of the Helmholtz Association for the fifth Programme-Oriented Funding period PoF V (2028--2034). Binding cross-association targets that apply to ZLP Augsburg through its HGF-affiliated centre DLR. Three Datenmanagement obligations directly relevant to Shepard: (a) ``the definition of a joint and cross-cutting architecture concept for the data management infrastructure (data acquisition, data analysis / aggregation, data provision per FAIR principles, and IP management)''; (b) NFDI alignment required, not optional -- ``the fundamental inclusion of work and recommendations already produced by NFDI''; (c) Datenresilienz -- ``the safeguarding of data resilience to guarantee the availability, integrity and access to data even in the case of unforeseen events, disruptions or failures''. Sibling cross-association targets: Pakt für Forschung und Innovation continuity through PoF V; Nachhaltigkeit (joint sustainability strategy + climate-neutral operation of research infrastructures). Primary source for aidocs/strategy/87-dlr-zlp-positioning.md \\S 7.5 (the federal-funding-cycle frame -- HGF research-policy targets for PoF V)."
  category: "dlr_internal"
