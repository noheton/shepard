  year: "2025"
  month: "jan"
  howpublished: "Institutional presentation deck; PDF, 29 pages, generated 2025-01-27 by Google Docs Renderer"
  note: "Twenty-nine-slide ZLP Augsburg positioning deck framing the centre's mission as ``data-driven'' production technology. Slides 1--7 introduce the centre (mission, four research-group Venn diagram, valley-of-death framing, DIKW-pyramid epistemology, Industry 4.0 vs 5.0 comparison, manufacturing-vision 2030+). Slides 8--14 articulate the digital-strategy stack (Exchange / Standardisation / Analytics / Data management) and name Shepard explicitly as the ``integrated data management system''. Slide 9 is the canonical Shepard architecture diagram (Shopfloor + OPC UA / Edge Collector $\\to$ REST API $\\to$ graph-organisational-DB with Time series / GIT / Files / Structured-documents stores); slide 10 the (raw) data-capture interface view (PLC Cell, KRC4, TPS Controller, PLC MTLH with PN/EC/UA/FSD/ADS/REST protocol overlay); slide 11 the data-contextualization architecture (Context Provider + Data Aggregator + leading-component observation); slide 12 the MFFD AFP thermoplastic fibre-placement demonstrator showing the live ``shepard_cube2-IR Image'' figure; slide 14 the GTlab/ADAPT gas-turbine-laboratory use case (a second use-case beyond MFFD). Slides 15--17 + 22 cover the Asset Administration Shell (AAS / Plattform Industrie 4.0) substrate. Slides 18--24 lay out the Manufacturing-X / Catena-X / Aerospace-X federation landscape, with slide 23 ``First planned application E2E-Quality assurance'' showing the architectural intent EDC $\\leftrightarrow$ AAS Repository $\\leftrightarrow$ SHEPARD for cross-supply-chain quality control --- primary-source evidence Shepard is positioned as the substrate underneath the planned aerospace dataspace. Slides 25--29 outlook: REBAR (EASA Learning Assurance), ForInfPro ML control-loop, HoKiTEP mobile-robotics platform, DrapeBot HMI. Used as primary source for aidocs/strategy/87-dlr-zlp-positioning.md \\S 8 and aidocs/strategy/94-federation-and-dataspaces.md. Provenance: uploaded to AI working memory 2026-05-23 by F.~Krebs."
  category: "dlr_internal"

krebsAerospaceXJaxa2025:
  entry_type: "misc"
  author: "Krebs, Florian"
  title: "Aerospace-X --- for JAXA"
  year: "2025"
  month: "mar"
  howpublished: "Talk slides; PPTX, 10 slides; speaker-date slide 1 ``Florian Krebs, 17.03.2025''; some slides re-used from a 2022-10-07 DLR ZAP talk"
  note: "Author-led briefing on the German Manufacturing-X / Aerospace-X programme for the Japanese Aerospace Exploration Agency (JAXA). Core claim: adapt the emerging Catena-X / Tractus-X automotive dataspace ecosystem to aeronautics needs (slide 3 cites Airbus's ``70% reuse, 30% adaptation'' positioning). Slide 5 names the Catena-X stack (AAS as digital-twin technological base; Eclipse Tractus-X open-source code base; estimated $\\sim$26 million AAS in the ecosystem demonstrator). Slide 6 lists the four Manufacturing-X priority use cases (Demand-and-capacity management, CO\\textsubscript2 emissions / PCF, Circularity / R-strategies, End-to-End quality management). Slide 7 sketches the cross-tier Aerospace-X data space for safety-critical aero-engine components (production monitoring + early warning, root-cause analysis from MRO findings, containment + countermeasure across Tier-n $\\to$ Engine OEM $\\to$ Aircraft OEM $\\to$ Airline). Slide 9 lays out the Manufacturing-X flagship-project function set (Design, Development, Do-how, Control, Communication, Support, Coordination). Slide 10 closes with the synchronisation-project framing (``a standardized global data exchange based on European values''). Used as primary source for aidocs/strategy/94-federation-and-dataspaces.md. Provenance: uploaded to AI working memory 2026-05-23 by F.~Krebs."
  category: "dlr_internal"

krebsFederationSketches2026:
  entry_type: "misc"
  author: "Krebs, Florian"
  title: "Federated Shepard & Pub-Service architecture sketches"
  year: "2026"
  month: "may"
  howpublished: "Two architecture sketches received in session chat 2026-05-23 (no file artefacts on disk; re-upload required for thesis-quality figure embedding)"
  note: "Two architecture sketches by F.~Krebs articulating the cross-instance integration paths Shepard must support. Sketch A (``Federated Shepard architecture''): a process-chain figure showing Simulation/Auslegung (as-designed) $\\to$ Bauteilherstellung $\\to$ NDT Prüfung (Laser US) $\\to$ Re-Simulation (as-built) $\\to$ Maintenance, with a side-branch for Destructive Testing. Each step labelled with DLR organisational roles (SY/VPH, SY/BT, BT/MO?, VPH, MO). A bottom horizontal bar labelled ``Common Data Infrastructure (shepard)'' connects bidirectionally to every process step. Footer note records the two integration paths explicitly: \\emph``2 Wege: Export Import zur Datenweitergabe (mittels RO-Crate) / Federated shepard service (viel Aufwand, höheres Risiko)'' --- the lower-risk RO-Crate export/import path, vs.\\ the higher-effort federated Shepard service path. Sketch B (``Pub-Service publication architecture''): a whiteboard photograph showing Shepard with ``Sammlung V1'' $\\to$ ``meta.json'' (with a DL-Lin\\ldots\\ annotation) $\\to$ ``Pub Service'' branching to Databus / S3 / Invenio; md5-checksum annotation on the collection node; ``FDM Institution'' header on the right margin. Concrete shape of the publication pipeline contemplated under HMC Phase 2 WP-1 (PID + export functionality). Both sketches are publication-quality candidates for the thesis architecture chapter; the physical originals (file uploads of the sketch and the whiteboard photograph) need to be re-uploaded for PDF embedding. Cited in aidocs/strategy/94-federation-and-dataspaces.md \\S 4 (Sketch A) and aidocs/strategy/90-hmc-phase-2-positioning.md \\S 3 (Sketch B). Provenance: received in AI session chat 2026-05-23."
  category: "dlr_internal"

helmholtzKiEmpfehlungen2024:
  entry_type: "misc"
  author: "Helmholtz-Gemeinschaft Deutscher Forschungszentren e.V."
  title: "Handlungsempfehlungen zum Einsatz von Künstlicher Intelligenz"
  year: "2024"
  month: "sep"
  howpublished: "Version 1.0, adopted by the Helmholtz Mitgliederversammlung on 2024-09-18; published by Helmholtz Geschäftsstelle Berlin (Anna-Louisa-Karsch-Straße 2, 10178 Berlin)"
  note: "Helmholtz-binding AI recommendations across 18 member centres. Five risk categories (4.1 data-protection / leak; 4.2 copyright/IP; 4.3 misinformation/scientific integrity; 4.4 bias from training data; 4.5 violation of AI-specific regulation incl.\\ EU AI Act). Good-practice baselines: review AI-generated content; document AI use transparently; responsible non-use for sensitive data; prefer European-hosted services. Authorship reserved for natural persons. Primary source for aidocs/strategy/93-management-context-and-compliance.md \\S 2 (AI-governance framework) and \\S 6.A audit lens. Uploaded to AI working memory 2026-05-23."
  category: "dlr_internal"

dlrKiLeitbild:
  entry_type: "misc"
