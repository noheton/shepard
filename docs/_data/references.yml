  note: "Two architecture sketches by F.~Krebs articulating the cross-instance integration paths Shepard must support. Sketch A (``Federated Shepard architecture''): a process-chain figure showing Simulation/Auslegung (as-designed) $\\to$ Bauteilherstellung $\\to$ NDT Prüfung (Laser US) $\\to$ Re-Simulation (as-built) $\\to$ Maintenance, with a side-branch for Destructive Testing. Each step labelled with DLR organisational roles (SY/VPH, SY/BT, BT/MO?, VPH, MO). A bottom horizontal bar labelled ``Common Data Infrastructure (shepard)'' connects bidirectionally to every process step. Footer note records the two integration paths explicitly: \\emph``2 Wege: Export Import zur Datenweitergabe (mittels RO-Crate) / Federated shepard service (viel Aufwand, höheres Risiko)'' --- the lower-risk RO-Crate export/import path, vs.\\ the higher-effort federated Shepard service path. Sketch B (``Pub-Service publication architecture''): a whiteboard photograph showing Shepard with ``Sammlung V1'' $\\to$ ``meta.json'' (with a DL-Lin\\ldots\\ annotation) $\\to$ ``Pub Service'' branching to Databus / S3 / Invenio; md5-checksum annotation on the collection node; ``FDM Institution'' header on the right margin. Concrete shape of the publication pipeline contemplated under HMC Phase 2 WP-1 (PID + export functionality). Both sketches are publication-quality candidates for the thesis architecture chapter; the physical originals (file uploads of the sketch and the whiteboard photograph) need to be re-uploaded for PDF embedding. Cited in aidocs/strategy/94-federation-and-dataspaces.md \\S 4 (Sketch A) and aidocs/strategy/90-hmc-phase-2-positioning.md \\S 3 (Sketch B). Provenance: received in AI session chat 2026-05-23."
  category: "dlr_internal"

