wantedFlo2012:
  entry_type: "unpublished"
  author: "Krebs, Florian"
  title: "``Wanted'' office-door poster"
  year: "2012"
  month: "jul"
  howpublished: "DOC (Composite Document File V2), 2 pp., 35 words; create-date 2012-07-25 09:50, last-saved 2012-07-25 10:41. Filename 9370feab-WANTED.doc ($\\sim$27\\,KB). Uploaded to AI working memory 2026-05-23"
  note: "Single-page satirical ``Wanted'' notice that hung on Krebs's office door at DLR ZLP Augsburg. Text in full: ``WANTED. EVIL GENIUS seeks minions to sacrifice their lives in world domination attempt. Must be prepared to work 24-7 for psychopath for close to no pay. Messy death inevitable but costumes and laser death rays provided. NO Weirdos.'' Cited at aidocs/strategy/89-genai-methodology-and-reflexivity.md \\S 8.5 as a small biographical primary source: the satire works only if the author is self-aware about the PI/collaborator asymmetry it parodies, which calibrates the register of the author's working voice fourteen years before the same author articulated, on a public deck, a thoughtful position on the human-machine asymmetry in AI-assisted science. Footnote-class source; not load-bearing."
