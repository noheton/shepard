  note: "Version 1.1 (Feb 2026); first published July 2025 (J\\\"ulich and Karlsruhe). CC BY-SA 4.0. Funded by DFG via NFDI4ING CADEN archetype (codes D.B.B01953, D.B.C02632). Initially presented at the international CoRDI 2025 conference at RWTH Aachen. Authors are the maintainers of JuliaBase (Bronger, FZJ), Kadi4Mat (Selzer/Nestler/Riem, KIT) and SciMesh (Bronger). German companion edition: \\hrefhttps://doi.org/10.5281/zenodo.1846823910.5281/zenodo.18468239. The community-standard reference for engineering-research RDM in Germany; covers FAIR life-cycle, DFG-aligned DMP template (\\S 4.1--4.6), the three free ELNs (JuliaBase / eLabFTW / Kadi4Mat), data-quality fundamentals, ELN-to-ELN data exchange via SciMesh (\\S 7.1), MetaData4Ing process model (\\S 7.5), Zenodo publication walk-through (\\S 8.2), and ML training-data preparation (\\S 8.4). Shepard positioning vs. this handbook is captured in aidocs/strategy/88-nfdi4ing-alignment.md \\S 5 and the thesis-positioning \\S 4.1 of aidocs/98-thesis-perspective.md."
