  note: "Consortium positioning deck for the BDLI-initiated, Airbus-Operations-led Aerospace-X project (the aerospace branch of the German BMWK-funded Manufacturing-X programme). Records: the regulatory-tsunami timeline (REACH~2007 through DPP~2030 and minimum recycling quotas 2036); the four pain-points motivating a sovereign aerospace dataspace (no seamless data transfer, paper-based documentation, multi-scan degradation, manual processes); the export-control and counterfeit-part traceability use cases; the project shape (consortium of 30+ companies/associations/research institutions, kickoff April~2024, 27-month duration, scope ``Supply Chain for Aircraft Manufacturing in Germany focusing fuselage, Cabin and Engine''); the four named use cases (Demand-and-capacity, CO\\textsubscript2/PCF, Circularity/R-Strategies, End-to-End Quality); the technical vision (Catena-X+AAS+Eclipse Tractus-X as substrate, EDC connectors federating); and the worked E2E-quality use case for safety-critical aero-engine components citing Bergs & Ganser IMEC~2024. Primary source for aidocs/strategy/92-aerospace-x-regulatory-context.md. Uploaded to AI working memory 2026-05-23."
  category: "policy"

