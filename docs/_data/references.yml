  note: "Author-led briefing on the German Manufacturing-X / Aerospace-X programme for the Japanese Aerospace Exploration Agency (JAXA). Core claim: adapt the emerging Catena-X / Tractus-X automotive dataspace ecosystem to aeronautics needs (slide 3 cites Airbus's ``70% reuse, 30% adaptation'' positioning). Slide 5 names the Catena-X stack (AAS as digital-twin technological base; Eclipse Tractus-X open-source code base; estimated $\\sim$26 million AAS in the ecosystem demonstrator). Slide 6 lists the four Manufacturing-X priority use cases (Demand-and-capacity management, CO\\textsubscript2 emissions / PCF, Circularity / R-strategies, End-to-End quality management). Slide 7 sketches the cross-tier Aerospace-X data space for safety-critical aero-engine components (production monitoring + early warning, root-cause analysis from MRO findings, containment + countermeasure across Tier-n $\\to$ Engine OEM $\\to$ Aircraft OEM $\\to$ Airline). Slide 9 lays out the Manufacturing-X flagship-project function set (Design, Development, Do-how, Control, Communication, Support, Coordination). Slide 10 closes with the synchronisation-project framing (``a standardized global data exchange based on European values''). Used as primary source for aidocs/strategy/94-federation-and-dataspaces.md. Provenance: uploaded to AI working memory 2026-05-23 by F.~Krebs."
