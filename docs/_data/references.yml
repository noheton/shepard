dlrCloudStrategie2019:
  entry_type: "techreport"
  author: "IT-LTG, DLR"
  title: "Cloud-Strategie des DLR: Rahmenbedingungen für die strategische Nutzung von IT-basierten Cloud-Diensten"
  institution: "Deutsches Zentrum für Luft- und Raumfahrt (DLR)"
  year: "2019"
  month: "sep"
  howpublished: "Version 1.0, dated 2019-09-26. Author: IT-LTG. Reviewed by IT-Lenkungsausschuss. Uploaded to AI working memory 2026-05-23"
  note: "DLR-wide cloud-services authorisation framework. Shifts from ``Cloud-Verbot'' to Chancen-Risiken-Abwägung posture. \\S 5.3 defines four risk tiers (Niedrig / Mittel / Hoch / Sehr hoch): ``Sehr hoch'' = external cloud forbidden; ``Hoch'' = Einzelfallprüfung + IT-Sicherheitsbeauftragter approval required; clouds outside Germany ``often unsuitable'' for Hoch tier. CIO + IT-Sicherheitsbeauftragter hold Veto-Recht. \\S 8 mandates Exit-Strategie + container-Lösungen. \\S 9 central cloud-services register. \\S 10 export-control rules. Primary source for aidocs/strategy/93-management-context-and-compliance.md \\S 4 + \\S 6.D audit lens."
  category: "dlr_internal"

