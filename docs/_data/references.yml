dlrSchoenheitsVamhri2018:
  entry_type: "misc"
  author: "Schönheits, Manfred and Krebs, Florian"
  title: "Embedding AR in Industrial HRI Applications"
  year: "2018"
  month: "mar"
  booktitle: "Proceedings of the Workshop on Virtual, Augmented and Mixed Reality for Human-Robot Interaction (VAM-HRI 2018)"
  publisher: "ACM"
  address: "Chicago, IL, USA"
  doi: "10.1145/nnnnnnn.nnnnnnn"
  howpublished: "VAM-HRI 2018 workshop paper, ACM"
  note: "VAM-HRI 2018 workshop paper by Schönheits and Krebs, both DLR Institute of Structures and Design, ZLP Augsburg. Six-page demonstrator paper describing an industrial HRI testbed built around a KUKA KR120 Quantec extra HA robot, Microsoft HoloLens, Pozyx UWB-RTLS, V-REP co-simulation, and OPC-UA middleware. Documents (i) a multi-modal HoloLens calibration process with three steps -- tap-gesture select, gaze-driven HUD manipulation, speech-command confirmation (``calibration done'') -- summarised in Table~1, and (ii) an interactive speech-driven robot control scheme with four commands (``Stop'', ``Look at me'', ``Come here'', ``Go home'') mapped as a pseudo-state machine (Figure~13). Safety frame: ISO 10218 + ISO/TS 15066; demo ran in manual mode with a separate dead-man operator. The 2018 anchor of an HRI research line the institute has continued through IROS 2018 Fan Challenge (Schoenheits, YouTube hJxTF9RISIw), DrapeBot 2023--2024 (YouTube nao1U3IB20k, 4CBZNBolAAE, r2pG1Lg393c), and is documented as a deliberate 2017--2024 strategic research line in aidocs/strategy/102 \\S 4. Filed under /root/.claude/uploads/33f9b6cd-283e-4eb5-bfea-fec7b3720743/a272d6be-VAMHRI2018_paper_17.pdf."
  category: "peer_reviewed"

dlrSchoenheitsKrebsHriWorkshop2017:
  entry_type: "misc"
