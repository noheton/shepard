  note: "Single-slide A0-format poster presenting the PLUTO mission's RDM work and its use of Shepard as the technology stack. Authors are all from DLR Institute of Space Systems, Bremen. The poster cites Friedline et al.~2025 (HMC Conference shepard paper), Haase et al.~2021 (Zenodo shepard release), Aksteiner et al.~2024 (PLUTO mission paper), and Holz 2024 (Bremen master thesis on deployable flexible solar arrays for space). Documents Shepard's role: storage (data containers as partitions of dedicated DBs), organization (collections / data objects / references; Parent/Child for hierarchy; Predecessor/Successor for sequence), access (REST + frontend + Python library + IAM with API keys), and documentation (key-value metadata + ontology classes + built-in Lab Journal). The file was uploaded by Florian Krebs annotated with his comments --- the poster itself is not FK-authored. Bib key chosen to credit the actual authors (Welzmüller \\emphet al.). Complements the existing welzmueller2024Pluto entry for the PLUTO mission paper. Uploaded to AI working memory 2026-05-23. Cited as primary source in the thesis-idea artefact inventory (project_thesis_idea.md)."
  category: "dlr_internal"

zlpDataDrivenIntelligence2025:
  entry_type: "misc"
  author: "DLR Zentrum für Leichtbauproduktionstechnologie (ZLP) Augsburg"
  title: "DLR ZLP Augsburg --- Data Driven Intelligence"
  year: "2025"
  month: "jan"
  howpublished: "Institutional presentation deck; PDF, 29 pages, generated 2025-01-27 by Google Docs Renderer"
  note: "Twenty-nine-slide ZLP Augsburg positioning deck framing the centre's mission as ``data-driven'' production technology. Slides 1--7 introduce the centre (mission, four research-group Venn diagram, valley-of-death framing, DIKW-pyramid epistemology, Industry 4.0 vs 5.0 comparison, manufacturing-vision 2030+). Slides 8--14 articulate the digital-strategy stack (Exchange / Standardisation / Analytics / Data management) and name Shepard explicitly as the ``integrated data management system''. Slide 9 is the canonical Shepard architecture diagram (Shopfloor + OPC UA / Edge Collector $\\to$ REST API $\\to$ graph-organisational-DB with Time series / GIT / Files / Structured-documents stores); slide 10 the (raw) data-capture interface view (PLC Cell, KRC4, TPS Controller, PLC MTLH with PN/EC/UA/FSD/ADS/REST protocol overlay); slide 11 the data-contextualization architecture (Context Provider + Data Aggregator + leading-component observation); slide 12 the MFFD AFP thermoplastic fibre-placement demonstrator showing the live ``shepard_cube2-IR Image'' figure; slide 14 the GTlab/ADAPT gas-turbine-laboratory use case (a second use-case beyond MFFD). Slides 15--17 + 22 cover the Asset Administration Shell (AAS / Plattform Industrie 4.0) substrate. Slides 18--24 lay out the Manufacturing-X / Catena-X / Aerospace-X federation landscape, with slide 23 ``First planned application E2E-Quality assurance'' showing the architectural intent EDC $\\leftrightarrow$ AAS Repository $\\leftrightarrow$ SHEPARD for cross-supply-chain quality control --- primary-source evidence Shepard is positioned as the substrate underneath the planned aerospace dataspace. Slides 25--29 outlook: REBAR (EASA Learning Assurance), ForInfPro ML control-loop, HoKiTEP mobile-robotics platform, DrapeBot HMI. Used as primary source for aidocs/strategy/87-dlr-zlp-positioning.md \\S 8 and aidocs/strategy/94-federation-and-dataspaces.md. Provenance: uploaded to AI working memory 2026-05-23 by F.~Krebs."
  category: "dlr_internal"

krebsAerospaceXJaxa2025:
  entry_type: "misc"
  author: "Krebs, Florian"
  title: "Aerospace-X --- for JAXA"
  year: "2025"
