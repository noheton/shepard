  note: "Author-led internal evaluation of the KUKA.CNC integration option (KUKA robots fronted by Siemens Sinumerik 840D control) versus the conventional KRL+RoboDK path the DLR ZLP centre operates today. Documents the X63 EMI interface (PROFINET IRT / ProfiSAFE), KSS 8.6+ requirement, lack of IIQKA.OS compatibility, the ``Sinumerik Run MyRobot / Machining with KUKA robots'' incompatibility with 840D Sl CNC-SW 4.9.x and Sinumerik ONE, and the medium-term compatibility risk posed by Siemens's ``Run My Robot / direct control'' (MTR) direction. Strategic conclusion: \\emphCNC-as-compatibility-factor (Airbus, ASA, PAG) weighed against \\char`\\~\\,€100k equipment cost, mandatory OLP, training, and the paradigm tension with autonomous-production research. Primary source for aidocs/strategy/87-dlr-zlp-positioning.md \\S 3.1. Provenance: uploaded to AI working memory 2026-05-23."
  category: "dlr_internal"

krebsMetrologyI42025:
  entry_type: "misc"
  author: "Krebs, Florian"
  title: "Integrating Metrology, Spatial Analyzer and Industry 4.0"
  year: "2025"
  howpublished: "Internal positioning talk slides; PDF, 10 slides"
  note: "Author-led survey of the DLR ZLP metrology platform (Spatial Analyzer Ultimate; 2$\\times$~Leica AT~901~LR; T-Probe; T-MAC; T-SCAN~5) and its day-to-day application set (GD&T of finished parts/assemblies, process-specific measurements, surface-geometry reconstruction). The deck's load-bearing advanced application is in-situ elastic calibration of robots (IREC): a 18-DOF lumped kinetostatic model running on a Linux-Xenomai real-time PC corrects the KUKA KR~120 HA TCP via the RSI interface every 4~ms, based on ATI 6-axis F/T sensor readings. Published results on the MFFD double-curvature mould with 280~N lateral / 1100~N normal load cases: 89.30% reduction in mean TCP deviation, 70.19% reduction in maximum deviation, trajectory within the $\\pm 0.3$~mm aerospace tolerance. Primary source for aidocs/strategy/87-dlr-zlp-positioning.md \\S 3.2 and the design seed in aidocs/integrations/96-metrology-spatial-analyzer.md. Provenance: uploaded to AI working memory 2026-05-23."
  category: "dlr_internal"

bmftrPofV2025:
