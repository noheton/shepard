krebsDlrk2021:
  entry_type: "inproceedings"
  author: "Krebs, Florian and Willmeroth, Mark and Haase, Tobias and Kaufmann, Patrick and Glück, Roland and Deden, Dennis and Brandt, Lars and Mayer, Manuel"
  title: "Systematische Erfassung, Verwaltung und Nutzung von Daten aus Experimenten"
  booktitle: "Deutscher Luft- und Raumfahrtkongress (DLRK 2021)"
  year: "2021"
  address: "Bremen, Germany"
  organization: "Deutsche Gesellschaft für Luft- und Raumfahrt (DGLR)"
  doi: "10.25967/550315"
  url: "https://doi.org/10.25967/550315"
  note: "DOI 10.25967/550315 confirmed via ORCID 0000-0001-6033-801X record (retrieved 2026-05-23 from \\urlhttps://pub.orcid.org/v3.0/0000-0001-6033-801X/record). Load-bearing peer-reviewed publication of record for Shepard's architecture. Krebs is lead author; the four Zenodo software-citation authors (Haase, Glück, Kaufmann, Willmeroth on @haaseShepard2021) are co-authors here. The paper describes the polyglot-persistence architecture (Neo4j + InfluxDB + MongoDB), the Collection/DataObject/Container/Reference data model citing the RDA Research Data Collections WG recommendation, the JWT/OAuth2/API-key authentication model, the OPC-Router + Data-Reference-Generator (DRG) shop-floor ingest stack, and the thermoplastic AFP use case at the ZLP Fiber Placement Cell (FPZ). The §5 outlook anticipates git integration, CAD/PDM integration, search/filter expansion, and access-rights management --- all of which the fork has since shipped or designed. Contact address florian.krebs@dlr.de. See aidocs/strategy/86 §5 and aidocs/98 §1.5."
  category: "papers"

audetIcra2024:
  entry_type: "inproceedings"
  author: "Audet, Julien-Mathieu and Fortin, Yves and Côté, Gabriel and Vistein, Michael and Brandt, Lars and Krebs, Florian and Monsarrat, Bruno"
  title: "Iterative Robot Calibration with Accuracy Saturation Termination and Application for AFP Processing of a Thermoplastic Aerostructure with Real-time Elastic Path Compensation"
  booktitle: "2024 IEEE International Conference on Robotics and Automation (ICRA)"
  year: "2024"
  organization: "IEEE"
  note: "Manuscript 2640. Krebs co-authored (DLR side: Vistein, Brandt, Krebs; NRC Canada lead: Audet, Fortin, Côté, Monsarrat). The paper introduces the ICAST (Iterative robot Calibration with Accuracy Saturation Termination) algorithm and applies it to in-situ elastic calibration of the DLR ZLP T-AFP robotic workcell --- a KUKA KR 120 HA on a rail system with an AFPT MTLH tape-laying machine and 6 kW Laserline LDM laser. Demonstrator: an 8-section thermoplastic rear pressure dome for next-generation aircraft. Calibration reduced from 31 to 17 poses with unaffected accuracy (0.057--0.064~mm side deviation). The cell is the same FPC described in @krebsDlrk2021 §3. Peer-reviewed publication evidence for the FPC research output. See aidocs/strategy/87 §3.x."
  category: "papers"

