title: shepard
description: >-
  Storage for HEterogeneous Product And Research Data — a multi-database
  research-data platform exposing a single REST API for timeseries, files,
  structured documents, spatial data, and semantic annotations.
url: "https://noheton.github.io"
# Project-page baseurl — site is served at https://noheton.github.io/shepard/.
# `relative_url` prepends this so /assets/css/main.css resolves correctly under
# the project path. If a custom domain is configured later, set baseurl: "".
baseurl: "/shepard"

# Custom layout — no theme. The single _layouts/default.html is intentionally
# minimal so the canonical DLR Corporate-Design swap-in (logo, palette, fonts)
# is a one-file diff once the assets arrive. See aidocs/33 §7 (forthcoming).
theme: null

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Pages live at the docs/ root (default behaviour). Collections kept minimal
# so this stays a "docs site", not a CMS.

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# Top navigation, consumed by _includes/header.html.
nav:
  - title: Home
    url: /
  - title: Architecture
    url: /architecture
  - title: Getting started
    url: /getting-started
  - title: User guide
    url: /user-guide
  - title: Deploying
    url: /reference/deployment
  - title: Admin
    url: /admin
  - title: System requirements
    url: /system-requirements

# Sub-navigation for the deployment section, surfaced as a tree by
# the in-app /help route (D1a) and by the public Pages site sidebar.
# Order is operational: front-door, then specialised runbooks in
# rough order of "things you think about when standing up an
# instance" (per docs/reference/deployment.md).
deployment_nav:
  - title: Deploying shepard
    url: /reference/deployment
  - title: "Quickstart: local demo"
    url: /reference/deployment-quickstart
  - title: Pre-flight checklist
    url: /reference/deployment-checklist
  - title: Sizing recommendations
    url: /reference/deployment-sizing
  - title: OIDC / authentication
    url: /reference/deployment-oidc
  - title: Storage backends
    url: /reference/deployment-storage
  - title: Secrets management
    url: /reference/deployment-secrets
  - title: Backup + restore
    url: /reference/deployment-backup
  - title: Monitoring + observability
    url: /reference/deployment-monitoring
  - title: Upgrade path
    url: /reference/deployment-upgrade
  - title: TLS + reverse proxy
    url: /reference/deployment-tls
  - title: Troubleshooting
    url: /reference/deployment-troubleshooting

# Snapshot date — bump when content is refreshed.
snapshot_date: 2026-05-14

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
