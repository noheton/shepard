    directory: /plugins/aas
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - "area:plugins"
    groups:
      plugin-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]

