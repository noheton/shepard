name: 🔐 Security finding (private advisory)
description: >
  Report a security vulnerability. This template creates a private GitHub
  Security Advisory — it is NOT a public issue. Real findings are routed
  privately; see the body for the preferred contact path.
title: "[SECURITY] <one-line summary>"
labels:
  - "type:bug"
  - "area:security"
  - "severity:critical"
private: true
body:
  - type: markdown
    attributes:
      value: |
        ## This form creates a PRIVATE GitHub Security Advisory

        Submitting this form opens a **private** draft advisory visible
        only to you and the maintainer — it is NOT a public issue.
        This is the correct mechanism for reporting security
        vulnerabilities in shepard without disclosing them to the public
        before a patch exists.

        **Preferred path:** Email **fkrebs@nucli.de** directly for the
        fastest response. Include:

        - A clear description of the issue
        - Reproduction steps (with concrete request bodies + headers if
          relevant — real values beat placeholders for reproducibility)
        - The impact you observed (what an attacker could do)
        - Your suggested fix or mitigation, if you have one
        - Whether you'd like to be credited in the eventual advisory

        Acknowledgement target: 72 hours. Patch + advisory target depends
        on severity (CVSS).

        ### What happens next

        Once a fix lands, the advisory is published via GitHub Security
        Advisories (the canonical CVE-grade record). You'll be invited
        as a collaborator on the draft advisory if you wanted credit.

        ### Scope

        Applicable to: authentication bypass, data leakage, RCE,
        privilege escalation, signed-URL TTL leakage, SPARQL injection,
        SSRF, and any other finding that puts user data or operations
        at risk.

  - type: checkboxes
    id: ack
    attributes:
      label: Acknowledgement
      options:
        - label: >
            I confirm this is a security vulnerability, not a general bug
            (general bugs go via the Bug report template).
          required: true
        - label: >
            I understand this form creates a PRIVATE advisory, not a
            public issue.
          required: true
