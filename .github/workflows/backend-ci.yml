name: Backend CI

# Runs unit tests, JaCoCo coverage check, and SpotBugs+findsecbugs on every
# push to main / dispatcher branch and on every PR touching backend code.
# Integration tests (testcontainer-bound) run in a separate job because they
# need docker available and take significantly longer.

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "backend/**"
      - "plugins/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "plugins/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write          # for the PR coverage comment
  checks: write                  # for the JaCoCo annotations

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests-coverage:
    name: Unit tests + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # PM1a phase 3 (ADR-0023): plugin JARs are declared as
      # backend `<dependency>` items in the `with-plugins` profile.
      # The plugin's `provided`-scope backend dep forces a two-pass
      # install: first stub-install the backend so each plugin can
      # resolve its compile-time core types, then install the
      # plugins so the backend's package step can resolve them back.
      # CI sequence below replicates the local developer workflow
      # documented in `docs/reference/plugins.md`. KIP1g + KIP1h add
      # the `shepard-plugin-kip` + `shepard-plugin-minter-local`
      # modules alongside UH1a; all three build independently
      # against the stub backend.
      #
      # PM1d adds a CLI-side `provided` dep on `shepard-admin` (so
      # plugins can ship Picocli subcommands via the
      # `AdminCliCommandProvider` SPI) and a `test-jar` classifier
      # dep on the CLI's test fixtures. CLI must be installed
      # between the backend stub-install and the plugin install.
      - name: Stub-install backend (so plugin `provided` deps resolve)
        working-directory: backend
        run: mvn -B -DnoPlugins -DskipTests -Dquarkus.build.skip=true install

      - name: Install CLI (so the plugin's CLI-side provided + test-jar deps resolve)
        working-directory: cli
        run: mvn -B -DnoPlugins -DskipTests install

      - name: Install unhide plugin module
        working-directory: plugins/unhide
        run: mvn -B -DskipTests install

      - name: Install kip plugin module
        working-directory: plugins/kip
        run: mvn -B -DskipTests install

      - name: Install minter-local plugin module
        working-directory: plugins/minter-local
        run: mvn -B -DskipTests install

      - name: Run plugin unit tests (kip)
        working-directory: plugins/kip
        run: mvn -B test

      - name: Run plugin unit tests (minter-local)
        working-directory: plugins/minter-local
        run: mvn -B test

      - name: Run unit tests + JaCoCo report + coverage gate
        working-directory: backend
        run: |
          mvn -B -P unit-test \
              -DskipITs \
              -Djacoco.haltOnFailure=true \
              verify

      - name: Publish JaCoCo XML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/jacoco-report/

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: backend/target/jacoco-report/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60        # gate matches the pom <minimum>
          min-coverage-changed-files: 70  # tighter for new code in this PR
          title: "Backend coverage"
          update-comment: true

  spotbugs-findsecbugs:
    name: SpotBugs + findsecbugs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # PM1a phase 3 (ADR-0023) + PM1d: same two-pass plugin/backend
      # install dance as the unit-tests job above. KIP1g + KIP1h add
      # the `shepard-plugin-kip` + `shepard-plugin-minter-local`
      # plugins alongside UH1a. PM1d inserts the CLI install before
      # plugin installs so the `AdminCliCommandProvider` provided
      # dep resolves.
      - name: Stub-install backend (so plugin `provided` deps resolve)
        working-directory: backend
        run: mvn -B -DnoPlugins -DskipTests -Dquarkus.build.skip=true install

      - name: Install CLI (so the plugin's CLI-side provided + test-jar deps resolve)
        working-directory: cli
        run: mvn -B -DnoPlugins -DskipTests install

      - name: Install unhide plugin module
        working-directory: plugins/unhide
        run: mvn -B -DskipTests install

      - name: Install kip plugin module
        working-directory: plugins/kip
        run: mvn -B -DskipTests install

      - name: Install minter-local plugin module
        working-directory: plugins/minter-local
        run: mvn -B -DskipTests install

      - name: Run SpotBugs + findsecbugs (fail on High-confidence findings)
        working-directory: backend
        run: |
          mvn -B -DskipTests \
              -Dspotbugs.failOnError=true \
              compile spotbugs:check

      - name: Publish SpotBugs XML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml
