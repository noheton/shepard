name: Doc-stage index check

# Fails if:
#  - aidocs/01-doc-stage-index.md is out of date (regenerated output differs
#    from the file on disk)
#  - any aidocs/**/*.md is missing a `stage:` YAML front-matter field
#
# Run on PRs and pushes that touch aidocs/ or the generator script.
# Stdlib-only Python — no extra dependencies.

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "aidocs/**"
      - "scripts/regenerate-doc-stage-index.py"
      - ".github/workflows/doc-stage-check.yml"
  pull_request:
    paths:
      - "aidocs/**"
      - "scripts/regenerate-doc-stage-index.py"
      - ".github/workflows/doc-stage-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  doc-stage-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history needed: the index includes a per-file `last-touched`
          # column populated via `git log -1 --format=%ad`. A shallow clone
          # (the default fetch-depth: 1) makes every file's last-touched
          # date equal to the merge commit's date, which then disagrees
          # with the committed index → spurious DRIFT.
          fetch-depth: 0

      - name: Check doc-stage index currency
        run: python3 scripts/regenerate-doc-stage-index.py --check
