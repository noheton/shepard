name: GitHub Pages

# Builds the Jekyll site under docs/ and deploys it via GitHub Pages.
#
# One-time repo setting required (maintainer): Settings -> Pages ->
# "Source" must be "GitHub Actions" (not "Deploy from a branch") for
# the actions/deploy-pages step below to take effect.
#
# Trigger posture:
#  - push to `main` — the production deploy after PR-#1001 merges.
#  - push to `claude/implement-input-raw-changes-2WiOF` — preview of
#    the dispatcher branch while PR-#1001 is still open. Drop this
#    branch from the list once the PR merges.
#  - workflow_dispatch — manual run from the Actions tab.

on:
  push:
    branches:
      - main
      - claude/implement-input-raw-changes-2WiOF
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
