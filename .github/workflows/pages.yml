name: GitHub Pages

# Builds the Jekyll site under docs/ and deploys it via GitHub Pages.
#
# One-time repo setting required (maintainer): Settings -> Pages ->
# "Source" must be "GitHub Actions" (not "Deploy from a branch") for
# the actions/deploy-pages step below to take effect.
#
# Trigger posture:
#  - push to `main` — production deploy.
#  - workflow_dispatch — manual run from the Actions tab.

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "scripts/bib2yml.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Programmatically flips repo Pages source to "GitHub Actions"
          # if it is still set to "Deploy from a branch" (or unset). Avoids
          # the manual Settings -> Pages toggle on first deploy.
          enablement: true

      - name: Regenerate bibliography YAML from BibTeX
        # The canonical bibliography lives in docs/_data/references.bib.
        # docs/_data/references.yml is the auto-generated mirror that Jekyll
        # actually renders on /bibliography. Regenerate it on every Pages
        # build so a maintainer who edits the .bib without running the script
        # locally still gets a consistent site. Stdlib-only — no extra setup.
        run: python3 scripts/bib2yml.py

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
