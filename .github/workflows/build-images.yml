name: Build images

# Builds the backend (Quarkus + UBI9 OpenJDK runtime image) and frontend
# (Nuxt 3) container images and pushes them to GitHub Container Registry
# (GHCR) so operators (and the fork's image-override compose recipe) can
# pull them.
#
# The published tags:
#  - ghcr.io/noheton/shepard-backend:latest    (rolling, on push to main)
#  - ghcr.io/noheton/shepard-backend:sha-<7>   (immutable, every push)
#  - ghcr.io/noheton/shepard-backend:v<x.y.z>  (on tag push v*.*.*)
#  - ghcr.io/noheton/shepard-frontend:...       same shape
#
# Triggers:
#  - push to main with backend/** or frontend/** changes
#  - tag push matching v*.*.*
#  - workflow_dispatch (manual)

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "plugins/**"
      - "frontend/**"
      - "infrastructure/docker-compose.yml"
      - ".github/workflows/build-images.yml"
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write          # GHCR push
  security-events: write   # Trivy SARIF → Code Scanning
  id-token: write          # SBOM signing (anchore/sbom-action)

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # PM1a phase 3 (ADR-0023) + PM1d + KIP1g + KIP1h: three-pass
      # build — backend stub-install so plugins' `provided` backend
      # deps resolve, CLI install so plugins' `AdminCliCommandProvider`-side
      # `provided` dep + test-jar classifier resolve, then plugin
      # installs so the backend's full build picks them up via the
      # default-active `with-plugins` profile. See backend-ci.yml +
      # `docs/reference/plugins.md` for the same sequence at
      # developer-loop level. KIP1g + KIP1h add the
      # `shepard-plugin-kip` + `shepard-plugin-minter-local`
      # modules alongside UH1a.
      - name: Stub-install backend (so plugin `provided` deps resolve)
        run: cd backend && mvn -B -DnoPlugins -DskipTests -Dquarkus.build.skip=true install

      - name: Install CLI (so the plugin's CLI-side provided + test-jar deps resolve)
        run: cd cli && mvn -B -DnoPlugins -DskipTests install

      - name: Install unhide plugin module
        run: cd plugins/unhide && mvn -B -DskipTests install

      - name: Install kip plugin module
        run: cd plugins/kip && mvn -B -DskipTests install

      - name: Install minter-local plugin module
        run: cd plugins/minter-local && mvn -B -DskipTests install

      - name: Install reference-dbpedia-databus plugin module
        run: cd plugins/reference-dbpedia-databus && mvn -B -DskipTests install

      - name: Build Quarkus app (skip tests — backend-ci.yml is the gate)
        run: cd backend && mvn -B -DskipTests package

      - name: Build CLI uber-jar (shaded `shepard-admin.jar` + `target/plugins/`)
        run: cd cli && mvn -B -DskipTests package

      # PM1a phase 3: stage the in-tree plugin JARs at
      # `backend/plugins-stage/` so the Dockerfile's COPY into
      # `/deployments/plugins/` picks them up. The same JARs are also
      # already inside `quarkus-app/lib/main/` (Quarkus's CDI scan
      # picks them up there); placing them under `/deployments/plugins/`
      # too is purely for operator visibility (`ls` shows what's
      # installed). PluginRegistry's classpath-then-jar dedup
      # silently shadows the duplicate.
      - name: Stage plugin JARs for image build
        run: |
          mkdir -p backend/plugins-stage
          cp plugins/unhide/target/shepard-plugin-unhide-*.jar backend/plugins-stage/
          cp plugins/kip/target/shepard-plugin-kip-*.jar backend/plugins-stage/
          cp plugins/minter-local/target/shepard-plugin-minter-local-*.jar backend/plugins-stage/
          cp plugins/reference-dbpedia-databus/target/shepard-plugin-reference-dbpedia-databus-*.jar backend/plugins-stage/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          REPO=ghcr.io/${{ github.repository_owner }}/shepard-backend
          TAGS="$REPO:sha-$SHA"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="$TAGS,$REPO:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAGS="$TAGS,$REPO:${GITHUB_REF_NAME}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build + push backend image
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Cache to GHCR's registry-cache so subsequent builds are fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (CycloneDX) for backend image
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/shepard-backend@${{ steps.build-backend.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-backend.cyclonedx.json
          upload-artifact: true
          upload-release-assets: true

      - name: Trivy scan — backend image (fail on HIGH+ CVEs)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/shepard-backend@${{ steps.build-backend.outputs.digest }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          # Don't block on dev-tier vulns that have no fix available
          # (re-evaluated weekly via the security.yml schedule).

      - name: Upload Trivy SARIF (backend) to Code Scanning
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Nuxt
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          REPO=ghcr.io/${{ github.repository_owner }}/shepard-frontend
          TAGS="$REPO:sha-$SHA"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="$TAGS,$REPO:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAGS="$TAGS,$REPO:${GITHUB_REF_NAME}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build + push frontend image
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (CycloneDX) for frontend image
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/shepard-frontend@${{ steps.build-frontend.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-frontend.cyclonedx.json
          upload-artifact: true
          upload-release-assets: true

      - name: Trivy scan — frontend image (fail on HIGH+ CVEs)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/shepard-frontend@${{ steps.build-frontend.outputs.digest }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF (frontend) to Code Scanning
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
