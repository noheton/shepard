name: CodeQL

# GitHub-native SAST. Multi-language taint analysis broader than the
# SpotBugs+findsecbugs gate in `ci.yml`. Findings flow to the
# repo's Security tab → Code scanning, and (in PRs) inline annotations.
#
# Triggers:
#  - push to main + dispatcher branch
#  - PRs against main
#  - weekly (Mondays 05:23 UTC) so dependency / language-spec drift
#    doesn't go unnoticed if no PR touches the relevant files
#  - manual

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write       # SARIF upload
  packages: read
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
            working-dir: backend
          - language: javascript-typescript
            build-mode: none
            working-dir: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended catches more taint flows than the default
          # `security-and-quality` set; trade-off is longer analysis (acceptable).
          queries: security-extended

      # The backend's `with-plugins` profile (active by default) and its two
      # always-on file-format plugin deps (svdx, thermography) must be present
      # in the local Maven repo before `mvn package` can resolve them. Mirror
      # the install dance from `ci.yml` so the CodeQL autobuild compiles the
      # full backend surface instead of failing at dependency resolution.
      # Without these steps the build fails before CodeQL can extract the
      # database, surfacing as a red "Analyze java-kotlin" (a build failure,
      # not a security finding). See aidocs/16 CI-BASELINE.
      - name: Stub-install backend (java-kotlin only)
        if: matrix.language == 'java-kotlin'
        working-directory: backend
        run: mvn -B -DnoPlugins -DskipTests -Dquarkus.build.skip=true install

      - name: Install CLI (java-kotlin only)
        if: matrix.language == 'java-kotlin'
        working-directory: cli
        run: mvn -B -DnoPlugins -DskipTests install

      - name: Install plugins (java-kotlin only)
        if: matrix.language == 'java-kotlin'
        run: |
          set -e
          for p in minter-local minter-datacite minter-epic unhide kip \
                   spatiotemporal hdf5 git file-s3 \
                   fileformat-svdx fileformat-thermography \
                   aas video ai; do
            if [ -f "plugins/$p/pom.xml" ]; then
              echo "::group::install plugin $p"
              (cd "plugins/$p" && mvn -B -DskipTests install)
              echo "::endgroup::"
            fi
          done

      - name: Build Java (manual mode)
        if: matrix.language == 'java-kotlin'
        run: cd ${{ matrix.working-dir }} && mvn -B -DskipTests package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
