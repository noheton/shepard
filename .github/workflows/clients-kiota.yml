name: Kiota /v2/ clients (CG1a)

# Regenerates the Kiota-emitted Python / TypeScript / Java clients for
# shepard's /v2/ API surface and runs per-language smoke tests on the
# regenerated tree. Implements CG1a (aidocs/16 row + ADR-0022 in aidocs/63).
#
# Triggers:
#  - tag push v*.*.*   — reproducibility check at release time.
#  - weekly cron       — catches Kiota CLI drift / upstream API regressions.
#  - manual dispatch   — for one-off regeneration runs.
#
# Source of truth: the *already-published* GHCR backend image
# (ghcr.io/noheton/shepard-backend:latest). Earlier versions booted
# `mvn quarkus:dev` for ~3 minutes just to serve /shepard/doc/openapi/v2.json
# locally; now that the per-shelf endpoint is fixed (P4c-fix), the GHCR
# image serves it directly and we just `docker run` + `curl`.
#
# Publishing the regenerated clients to PyPI / npm / Maven Central is
# OUT OF SCOPE here — that's CG1c. This workflow only emits build
# artefacts that a maintainer can inspect.

on:
  push:
    tags:
      - "v*.*.*"
  schedule:
    # Mondays 04:13 UTC — staggered off the dependency-check cron in security.yml.
    - cron: "13 4 * * 1"
  workflow_dispatch:
    inputs:
      kiota_input_url:
        description: "OpenAPI v2 source URL (defaults to the GHCR image; override to a tagged-release URL)"
        required: false
        default: ""
      backend_image:
        description: "Backend image to pull (defaults to :latest)"
        required: false
        default: "ghcr.io/noheton/shepard-backend:latest"

permissions:
  contents: read
  packages: read

concurrency:
  group: clients-kiota-${{ github.ref }}
  cancel-in-progress: false

env:
  # Pinned per aidocs/57 §4.1 — bump this in lockstep with the Makefile.
  KIOTA_VERSION: "1.31.1"
  BACKEND_IMAGE: ${{ github.event.inputs.backend_image || 'ghcr.io/noheton/shepard-backend:latest' }}

jobs:
  generate-and-smoke:
    name: Generate + smoke-test (Python + TypeScript + Java)
    runs-on: ubuntu-latest

    # Neo4j is needed because the backend runs migrations on startup —
    # without a reachable DB it refuses to boot. The /shepard/doc/openapi/v2.json
    # endpoint itself doesn't read from Neo4j, but the boot path does.
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["n10s"]'
          NEO4J_dbms_security_procedures_unrestricted: "n10s.*,apoc.*"
          NEO4J_dbms_security_procedures_allowlist: "n10s.*,apoc.*"
        ports:
          - 7687:7687
          - 7474:7474

    steps:
      - uses: actions/checkout@v4

      # --- Toolchain --------------------------------------------------
      - name: Set up .NET 8 (for Kiota CLI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Kiota CLI (pinned)
        run: |
          dotnet tool install --global Microsoft.OpenApi.Kiota --version "${KIOTA_VERSION}"
          echo "${HOME}/.dotnet/tools" >> "${GITHUB_PATH}"
          kiota --version

      - name: Set up Node 24 (TS smoke)
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python 3.12 (Python smoke)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up JDK 21 (Java smoke)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # --- Backend up (GHCR image; no Quarkus dev-mode dance) ------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull + run backend image
        id: boot
        run: |
          docker pull "${BACKEND_IMAGE}"
          docker run -d --name shepard-backend \
            --network host \
            -e QUARKUS_NEO4J_URI="bolt://localhost:7687" \
            -e QUARKUS_NEO4J_AUTHENTICATION_USERNAME="neo4j" \
            -e QUARKUS_NEO4J_AUTHENTICATION_PASSWORD="testpassword" \
            -e SHEPARD_HDF_ENABLED=false \
            -e SHEPARD_TIMESERIES_QUALITY_SCORING_ENABLED=false \
            "${BACKEND_IMAGE}"
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/shepard/doc/openapi/v2.json -o /dev/null 2>&1; then
              echo "Backend up after ${i} attempts."
              exit 0
            fi
            sleep 5
          done
          echo "Backend did NOT become reachable in 5 min. Backend logs:"
          docker logs shepard-backend | tail -200
          exit 1
        continue-on-error: true

      - name: Resolve KIOTA_INPUT_URL
        id: resolve-url
        run: |
          if [[ -n "${{ github.event.inputs.kiota_input_url }}" ]]; then
            echo "url=${{ github.event.inputs.kiota_input_url }}" >> "${GITHUB_OUTPUT}"
          else
            echo "url=http://localhost:8080/shepard/doc/openapi/v2.json" >> "${GITHUB_OUTPUT}"
          fi

      - name: Capture OpenAPI v2 snapshot
        if: steps.boot.outcome == 'success'
        run: |
          curl -fsS "${{ steps.resolve-url.outputs.url }}" -o openapi-v2-snapshot.json
          jq '.info' openapi-v2-snapshot.json || true

      - name: Upload OpenAPI v2 snapshot
        if: steps.boot.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: openapi-v2-snapshot
          path: openapi-v2-snapshot.json

      # --- Generate + smoke ----------------------------------------------
      - name: Generate all three Kiota clients
        if: steps.boot.outcome == 'success'
        run: |
          cd clients-v2
          KIOTA_INPUT_URL="${{ steps.resolve-url.outputs.url }}" make generate-all

      - name: Python smoke — install + import + ctor-signature
        if: steps.boot.outcome == 'success'
        run: |
          cd clients-v2/python-kiota
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pytest -q ../tests/smoke/test_kiota_python.py

      - name: TypeScript smoke — typecheck + import resolution
        if: steps.boot.outcome == 'success'
        run: |
          cd clients-v2/typescript-kiota
          npm install
          npx tsc --noEmit
          npm pack --pack-destination /tmp
          cd ../tests/smoke
          npm init -y > /dev/null
          npm install /tmp/*.tgz tsx typescript
          npx tsx ./kiota-typescript.test.ts

      - name: Java smoke — compile + reflection check
        if: steps.boot.outcome == 'success'
        run: |
          cd clients-v2/java-kiota
          mvn -B -DskipTests compile
          mkdir -p src/test/java/de/dlr/shepard/v2/clients
          cp ../tests/smoke/KiotaJavaSmokeTest.java src/test/java/de/dlr/shepard/v2/clients/
          mvn -B -DskipTests test-compile
          mvn -B exec:java \
              -Dexec.mainClass=de.dlr.shepard.v2.clients.KiotaJavaSmokeTest \
              -Dexec.classpathScope=test

      - name: Upload regenerated client trees
        if: steps.boot.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: clients-v2-generated-${{ github.ref_name }}
          path: |
            clients-v2/python-kiota/shepard_v2/
            clients-v2/typescript-kiota/src/
            clients-v2/java-kiota/src/main/java/
          if-no-files-found: error

      - name: Backend logs on failure
        if: failure()
        run: docker logs shepard-backend | tail -200 || true

      - name: Stop backend
        if: always()
        run: docker rm -f shepard-backend 2>/dev/null || true
