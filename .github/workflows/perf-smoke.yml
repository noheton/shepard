name: Weekly perf smoke

# PERF3 — weekly CI performance smoke test.
#
# Boots the full compose stack, runs the k6 smoke script against it,
# and files a GitHub issue for each threshold breach.  Off the critical
# path: PRs are NOT gated by this workflow.
#
# Design: aidocs/ops/59-performance-testing-and-tuning.md §6.
#
# Triggers:
#   - weekly (Sundays 02:17 UTC) so results land before Monday standups
#   - workflow_dispatch for ad-hoc runs (e.g. after a suspected regression)
#
# Requirements:
#   - The repository secret SHEPARD_ADMIN_API_KEY must be set to an
#     instance-admin API key for the test instance.  The CI stack seeds
#     this key at startup via SHEPARD_INITIAL_API_KEY.
#   - k6 is pulled from the official grafana/k6 Docker image — no binary
#     install required.

on:
  schedule:
    - cron: "17 2 * * 0"    # Sundays 02:17 UTC (staggered off other weeklies)
  workflow_dispatch:
    inputs:
      post_issue:
        description: "File a GitHub issue on threshold breach?"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: read
  issues: write             # create issues on threshold breach

concurrency:
  group: perf-smoke
  cancel-in-progress: true  # drop stale weekly run if a new dispatch races it

jobs:
  smoke:
    name: k6 smoke — compose stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SHEPARD_BASE_URL: http://localhost:8080
      # Seeded by compose via SHEPARD_INITIAL_API_KEY → the key used below.
      SHEPARD_API_KEY: ${{ secrets.SHEPARD_PERF_API_KEY || 'ci-perf-key' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Start compose stack ───────────────────────────────────────────────
      # Minimal profile: backend + MongoDB + Neo4j + TimescaleDB.
      # No S3 / monitoring / HSDS sidecar needed for the smoke test.
      - name: Start compose stack
        run: |
          docker compose \
            -f infrastructure/docker-compose.yml \
            up -d --wait \
            --wait-timeout 120
        env:
          SHEPARD_INITIAL_API_KEY: ${{ env.SHEPARD_API_KEY }}

      # ── 3. Wait for /versionz ────────────────────────────────────────────────
      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/versionz || echo 000)
            if [ "$STATUS" = "200" ]; then
              echo "Backend ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — waiting 5 s"
            sleep 5
          done
          echo "Backend did not become ready in 150 s"
          docker compose -f infrastructure/docker-compose.yml logs backend --tail=50
          exit 1

      # ── 4. Run k6 smoke ──────────────────────────────────────────────────────
      - name: Run k6 smoke
        id: k6
        # continue-on-error so we can capture exit code for the issue step
        continue-on-error: true
        run: |
          docker run --rm \
            --network host \
            -e SHEPARD_BASE_URL="${SHEPARD_BASE_URL}" \
            -e SHEPARD_API_KEY="${SHEPARD_API_KEY}" \
            -v "$PWD/scripts/perf":/scripts:ro \
            grafana/k6 run \
              --out json=/scripts/k6-results.json \
              /scripts/k6-smoke.js 2>&1 | tee k6-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      # ── 5. Upload k6 artifacts ───────────────────────────────────────────────
      - name: Upload k6 output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-results
          path: |
            k6-output.txt
            scripts/perf/last-run.json
          retention-days: 30

      # ── 6. Compose logs on failure ───────────────────────────────────────────
      - name: Dump compose logs on failure
        if: steps.k6.outcome == 'failure'
        run: |
          docker compose -f infrastructure/docker-compose.yml logs \
            --tail=100 backend

      # ── 7. File GitHub issue on threshold breach ─────────────────────────────
      - name: File issue on threshold breach
        if: >-
          steps.k6.outcome == 'failure' &&
          (github.event_name == 'schedule' ||
           inputs.post_issue == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '';
            try {
              const raw = fs.readFileSync('scripts/perf/last-run.json', 'utf8');
              const data = JSON.parse(raw);
              const thresholds = data.metrics
                ? Object.entries(data.metrics)
                    .filter(([, v]) => v.thresholds && Object.values(v.thresholds).some(t => !t.ok))
                    .map(([k, v]) => {
                      const failing = Object.entries(v.thresholds)
                        .filter(([, t]) => !t.ok)
                        .map(([expr]) => expr);
                      return `- **${k}**: ${failing.join(', ')}`;
                    })
                : [];
              summary = thresholds.length
                ? '### Failing thresholds\n\n' + thresholds.join('\n')
                : '_(threshold detail unavailable — check k6-output artifact)_';
            } catch {
              summary = '_(could not parse last-run.json — check k6-output artifact)_';
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.slice(0, 7);

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[perf] k6 smoke threshold breach — ${sha}`,
              labels: ['performance', 'automated'],
              body: [
                '## Weekly perf smoke — threshold breach',
                '',
                `**Commit:** ${context.sha}`,
                `**Run:** ${runUrl}`,
                `**Date:** ${new Date().toISOString().slice(0, 10)}`,
                '',
                summary,
                '',
                '### Next steps',
                '',
                '1. Download the `k6-smoke-results` artifact from the run above.',
                '2. Run `scripts/perf/recommend.py` locally to get ranked suggestions.',
                '3. Apply safe-to-apply suggestions; re-run smoke to confirm regression is gone.',
                '4. Close this issue once the threshold is green again.',
                '',
                '_Auto-filed by `.github/workflows/perf-smoke.yml` (PERF3)._',
              ].join('\n'),
            });

      # ── 8. Fail the job if k6 failed ─────────────────────────────────────────
      - name: Propagate k6 exit code
        if: steps.k6.outcome == 'failure'
        run: exit 1

      # ── 9. Teardown ──────────────────────────────────────────────────────────
      - name: Stop compose stack
        if: always()
        run: |
          docker compose -f infrastructure/docker-compose.yml down -v
